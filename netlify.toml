[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/"
  to = "/upload.html"
  status = 200
  force = true

[[redirects]]
  from = "/upload"
  to = "/upload.html"
  status = 200
  force = true

[[redirects]]
  from = "/upload/"
  to = "/upload.html"
  status = 200
  force = true
