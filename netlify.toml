[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[dev]
  command = "npm run dev"
  targetPort = 5173
  port = 8888

[[redirects]]
  from = "/"
  to = "/upload.html"
  status = 200
  force = true

[[redirects]]
  from = "/upload"
  to = "/upload.html"
  status = 200
  force = true

[[redirects]]
  from = "/upload/"
  to = "/upload.html"
  status = 200
  force = true
