  <body>
    <div class="shell">
      <header>
        <span class="tag">Upload chantier</span>
        <h1>Ajouter des photos</h1>
        <p>Sélectionnez une catégorie, puis la sous-catégorie si besoin.</p>
      </header>

      <button class="btn btn-save hidden" type="button" id="saveOrderButton">
        ENREGISTRER L'ORDRE
      </button>

      <section id="categoryView" class="card">
        <div class="section-title">Choisissez une catégorie</div>
        <div class="grid" id="categoryButtons"></div>
      </section>

      <section id="subcategoryView" class="card hidden">
        <button class="btn btn-back" type="button" id="backToCategories">
          ← Retour
        </button>
        <div class="section-title" id="subcategoryTitle"></div>
        <div class="grid" id="subcategoryButtons"></div>
      </section>

      <section id="uploadView" class="card hidden">
        <button class="btn btn-back" type="button" id="backToSubcategories">
          ← Retour
        </button>
        <div class="section-title" id="uploadTitle">Ajouter des photos</div>
        <div class="path-box" id="selectedPath"></div>
        <button class="btn btn-upload" type="button" id="uploadButton">
          Ajouter une photo
        </button>
        <input
          id="fileInput"
          type="file"
          accept="image/jpeg,image/png,image/webp,image/heic,image/heif"
          multiple
          class="hidden"
        />
        <div class="helper">Formats acceptés: jpg, jpeg, png, webp.</div>
        <div class="status" id="statusMessage" aria-live="polite"></div>
      </section>
      <section id="orderView" class="card order-card hidden">
        <div class="section-title">Ordre des photos</div>
        <div class="order-scroll" id="orderScroll">
          <div class="order-grid" id="orderGrid"></div>
          <div class="order-empty hidden" id="orderEmpty">Aucune photo dans ce dossier.</div>
        </div>
        <div class="helper">Appui long pour deplacer une image.</div>
        <div class="status" id="orderStatus" aria-live="polite"></div>
      </section>
    </div>

    <script>
      const CLOUDINARY_CONFIG = {
        cloudName: "dq7d6rmbp",
        uploadPreset: "kgehqzfz",
      };
      const DUPLICATE_CHECK_ENDPOINT = "/.netlify/functions/check-image";
      const LIST_IMAGES_ENDPOINT = "/.netlify/functions/list-images";
      const SAVE_ORDER_ENDPOINT = "/.netlify/functions/save-order";

      const CATEGORIES = [
        {
          id: "finalisations",
          label: "Finalisation",
          folder: "finalisations",
        },
        {
          id: "fondations",
          label: "Fondation",
          folder: "fondations",
          subcategories: [
            { id: "fondations-batiments", label: "Bâtiments", folder: "fondations-batiments" },
            { id: "fondations-betons", label: "Bétons", folder: "fondations-betons" },
            { id: "fondations-fouilles", label: "Fouilles", folder: "fondations-fouilles" },
            { id: "fondations-plots", label: "Plots", folder: "fondations-plots" },
            { id: "fondations-propretes", label: "Propretés", folder: "fondations-propretes" },
            { id: "fondations-radier", label: "Radier", folder: "fondations-radier" },
            { id: "fondations-semelles", label: "Semelles", folder: "fondations-semelles" },
          ],
        },
        {
          id: "murs-cloisons",
          label: "Mur et cloison",
          folder: "murs-cloisons",
        },
        {
          id: "dalle-beton",
          label: "Dalle béton",
          folder: "dalle-beton",
          subcategories: [
            { id: "plancher", label: "Plancher", folder: "plancher" },
            { id: "sol-beton", label: "Sol béton", folder: "sol-beton" },
          ],
        },
        {
          id: "renovation",
          label: "Rénovation",
          folder: "renovation",
        },
        {
          id: "etancheite-terrassement",
          label: "Étanchéité & Terrassement",
          folder: "etancheite-terrassement",
        },
        {
          id: "escalier",
          label: "Escalier",
          folder: "escalier",
        },
      ];

      const state = {
        currentCategory: null,
        currentFolder: null,
        currentLabel: null,
        images: [],
        hasManualOrder: false,
      };

      const categoryView = document.getElementById("categoryView");
      const subcategoryView = document.getElementById("subcategoryView");
      const uploadView = document.getElementById("uploadView");
      const orderView = document.getElementById("orderView");
      const categoryButtons = document.getElementById("categoryButtons");
      const subcategoryButtons = document.getElementById("subcategoryButtons");
      const subcategoryTitle = document.getElementById("subcategoryTitle");
      const uploadTitle = document.getElementById("uploadTitle");
      const selectedPath = document.getElementById("selectedPath");
      const statusMessage = document.getElementById("statusMessage");
      const fileInput = document.getElementById("fileInput");
      const uploadButton = document.getElementById("uploadButton");
      const saveOrderButton = document.getElementById("saveOrderButton");
      const orderGrid = document.getElementById("orderGrid");
      const orderStatus = document.getElementById("orderStatus");
      const orderEmpty = document.getElementById("orderEmpty");

      function renderCategories() {
        categoryButtons.innerHTML = "";
        CATEGORIES.forEach((category, index) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `btn ${index % 2 === 0 ? "btn-secondary" : "btn-tertiary"}`;
          button.textContent = category.label;
          button.addEventListener("click", () => selectCategory(category.id));
          categoryButtons.appendChild(button);
        });
      }

      function showView(view) {
        categoryView.classList.toggle("hidden", view !== "category");
        subcategoryView.classList.toggle("hidden", view !== "subcategory");
        const inUpload = view === "upload";
        uploadView.classList.toggle("hidden", !inUpload);
        orderView.classList.toggle("hidden", !inUpload);
        saveOrderButton.classList.toggle("hidden", !inUpload);
      }

      function selectCategory(categoryId) {
        const category = CATEGORIES.find((item) => item.id === categoryId);
        state.currentCategory = category;
        statusMessage.textContent = "";

        if (category.subcategories && category.subcategories.length) {
          subcategoryTitle.textContent = category.label;
          subcategoryButtons.innerHTML = "";
          category.subcategories.forEach((sub) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className = "btn btn-secondary";
            button.textContent = sub.label;
            button.addEventListener("click", () => selectSubcategory(sub));
            subcategoryButtons.appendChild(button);
          });
          showView("subcategory");
          return;
        }

        selectUploadTarget(category.label, category.folder);
      }

      function selectSubcategory(subcategory) {
        const category = state.currentCategory;
        if (!category) {
          showView("category");
          return;
        }
        const folder = `${category.folder}/${subcategory.folder}`;
        const label = `${category.label} / ${subcategory.label}`;
        selectUploadTarget(label, folder);
      }

      function selectUploadTarget(label, folder) {
        const fullFolder = `celik-portfolio/${folder}`;
        state.currentLabel = label;
        state.currentFolder = fullFolder;
        uploadTitle.textContent = label;
        selectedPath.textContent = fullFolder;
        showView("upload");
        loadImagesForFolder();
      }

      function openUploadWidget() {
        if (!state.currentFolder) {
          statusMessage.textContent = "Selectionnez d'abord un dossier.";
          return;
        }

        if (fileInput) {
          fileInput.value = "";
          fileInput.click();
        }
      }

      async function computeSha1(file) {
        const buffer = await file.arrayBuffer();
        const digest = await crypto.subtle.digest("SHA-1", buffer);
        const hashArray = Array.from(new Uint8Array(digest));
        return hashArray.map((byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      async function checkDuplicate(hash) {
        try {
          const response = await fetch(
            `${DUPLICATE_CHECK_ENDPOINT}?hash=${encodeURIComponent(hash)}`
          );
          if (!response.ok) {
            return false;
          }
          const data = await response.json();
          return Boolean(data?.exists);
        } catch (error) {
          return false;
        }
      }

      function parsePosition(rawPosition) {
        const value = Number(rawPosition);
        return Number.isFinite(value) ? value : null;
      }

      function buildVideoThumbnail(publicId) {
        if (!publicId) {
          return "";
        }
        return `https://res.cloudinary.com/${CLOUDINARY_CONFIG.cloudName}/video/upload/so_0,f_jpg/${publicId}.jpg`;
      }

      function detectManualOrder(items) {
        return items.length > 0 && items.every((item) => Number.isFinite(item.position));
      }

      function sortImages(items) {
        if (state.hasManualOrder) {
          return items
            .slice()
            .sort((a, b) => (a.position || 0) - (b.position || 0));
        }
        return items
          .slice()
          .sort((a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime());
      }

      function updateOrderIndexes() {
        const items = Array.from(orderGrid.children);
        items.forEach((item, index) => {
          const badge = item.querySelector(".order-index");
          if (badge) {
            badge.textContent = `${index + 1}`;
          }
        });
      }

      function renderOrderGrid() {
        orderGrid.innerHTML = "";
        if (!state.images.length) {
          orderEmpty.classList.remove("hidden");
          return;
        }

        orderEmpty.classList.add("hidden");
        state.images.forEach((image, index) => {
          const item = document.createElement("div");
          item.className = "order-item";
          item.dataset.publicId = image.public_id;

          const img = document.createElement("img");
          img.src = image.kind === "video" ? buildVideoThumbnail(image.public_id) : image.secure_url;
          img.alt = state.currentLabel || "Photo chantier";
          img.loading = "lazy";

          const badge = document.createElement("div");
          badge.className = "order-index";
          badge.textContent = `${index + 1}`;

          if (image.kind === "video") {
            const videoBadge = document.createElement("div");
            videoBadge.className = "order-video-badge";
            videoBadge.textContent = "▶";
            item.appendChild(videoBadge);
          }

          item.appendChild(img);
          item.appendChild(badge);
          orderGrid.appendChild(item);
        });
      }

      function getOrderedPublicIds() {
        return Array.from(orderGrid.children)
          .map((item) => item.dataset.publicId)
          .filter(Boolean);
      }

      function syncStateFromDom() {
        const orderedIds = getOrderedPublicIds();
        const lookup = new Map(state.images.map((image) => [image.public_id, image]));
        state.images = orderedIds.map((id) => lookup.get(id)).filter(Boolean);
        updateOrderIndexes();
      }

      async function loadImagesForFolder() {
        if (!state.currentFolder) {
          return;
        }
        const endpoint = `${LIST_IMAGES_ENDPOINT}?folder=${encodeURIComponent(
          state.currentFolder
        )}`;
        orderStatus.textContent = "Chargement des photos...";
        orderGrid.innerHTML = "";
        orderEmpty.classList.add("hidden");

        try {
          const response = await fetch(endpoint);
          if (!response.ok) {
            const errorText = await response.text();
            console.error("Cloudinary list error", {
              folder: state.currentFolder,
              endpoint,
              status: response.status,
              statusText: response.statusText,
              body: errorText,
            });
            orderStatus.textContent =
              "Erreur lors du chargement des photos. Verifie la connexion ou la config Cloudinary.";
            return;
          }

          const data = await response.json();
          const items = Array.isArray(data?.items) ? data.items : [];
          const normalized = items.map((item) => ({
            public_id: item.public_id,
            secure_url: item.secure_url,
            created_at: item.created_at,
            kind: item.resource_type === "video" ? "video" : "image",
            position: parsePosition(item.position),
          }));

          state.hasManualOrder = detectManualOrder(normalized);
          state.images = sortImages(normalized);
          renderOrderGrid();
          orderStatus.textContent = "";
        } catch (error) {
          console.error("Cloudinary list error", {
            folder: state.currentFolder,
            endpoint,
            error,
          });
          orderStatus.textContent =
            "Erreur lors du chargement des photos. Verifie la connexion ou la config Cloudinary.";
        }
      }

      async function saveOrderPayload(items) {
        if (!items.length) {
          return false;
        }
        try {
          const response = await fetch(SAVE_ORDER_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items }),
          });
          return response.ok;
        } catch (error) {
          return false;
        }
      }

      async function saveCurrentOrder() {
        if (!state.images.length) {
          orderStatus.textContent = "Aucune photo a enregistrer.";
          return;
        }
        orderStatus.textContent = "Enregistrement de l'ordre...";
        saveOrderButton.disabled = true;
        saveOrderButton.textContent = "ENREGISTREMENT...";

        const orderedIds = getOrderedPublicIds();
        const payload = orderedIds.map((id, index) => {
          const item = state.images.find((image) => image.public_id === id);
          return {
            public_id: id,
            position: index + 1,
            resource_type: item?.kind === "video" ? "video" : "image",
          };
        });

        const success = await saveOrderPayload(payload);

        saveOrderButton.disabled = false;
        saveOrderButton.textContent = "ENREGISTRER L'ORDRE";

        if (!success) {
          orderStatus.textContent = "Erreur lors de l'enregistrement.";
          return;
        }

        state.images = state.images.map((image) => {
          const idx = orderedIds.indexOf(image.public_id);
          return { ...image, position: idx + 1 };
        });
        state.hasManualOrder = true;
        state.images = sortImages(state.images);
        renderOrderGrid();
        orderStatus.textContent = "Ordre sauvegarde.";
      }

      async function assignPositionAfterUpload(uploadedAsset) {
        if (!uploadedAsset?.public_id) {
          return;
        }

        const existing = state.images.slice();
        const hasFullPositions = detectManualOrder(existing);
        if (!hasFullPositions) {
          const orderedIds = getOrderedPublicIds();
          const orderedImages = orderedIds
            .map((id) => existing.find((image) => image.public_id === id))
            .filter(Boolean);

          const baseImages = orderedImages.length
            ? orderedImages
            : existing.slice().sort((a, b) => {
                return new Date(a.created_at).getTime() - new Date(b.created_at).getTime();
              });

          const updatedImages = baseImages.concat({
            ...uploadedAsset,
            position: baseImages.length + 1,
          });
          const payload = updatedImages.map((image, index) => ({
            public_id: image.public_id,
            position: index + 1,
            resource_type: image.kind === "video" ? "video" : "image",
          }));
          const success = await saveOrderPayload(payload);
          if (success) {
            state.images = updatedImages.map((image, index) => ({
              ...image,
              position: index + 1,
            }));
            state.hasManualOrder = true;
            renderOrderGrid();
          }
          return;
        }

        const maxPosition = existing.reduce((max, image) => {
          return Number.isFinite(image.position) ? Math.max(max, image.position) : max;
        }, 0);
        const nextPosition = maxPosition + 1;
        const success = await saveOrderPayload([
          {
            public_id: uploadedAsset.public_id,
            position: nextPosition,
            resource_type: "image",
          },
        ]);
        if (success) {
          state.images = sortImages(
            existing.concat({ ...uploadedAsset, position: nextPosition })
          );
          renderOrderGrid();
        }
      }

      async function uploadFiles(files) {
        const maxFileSize = 120000000;
        let uploadedCount = 0;
        let skippedCount = 0;
        let duplicateCount = 0;
        let lastError = "";
        const seenHashes = new Set();

        uploadButton.disabled = true;
        uploadButton.textContent = "Upload en cours...";
        statusMessage.textContent = "Verification des doublons...";

        for (const file of files) {
          if (file.size > maxFileSize) {
            skippedCount += 1;
            continue;
          }

          let hash = "";
          try {
            hash = await computeSha1(file);
          } catch (error) {
            hash = "";
          }

          if (hash) {
            if (seenHashes.has(hash)) {
              duplicateCount += 1;
              continue;
            }
            seenHashes.add(hash);
          }

          if (hash) {
            const exists = await checkDuplicate(hash);
            if (exists) {
              duplicateCount += 1;
              continue;
            }
          }

          const formData = new FormData();
          formData.append("file", file);
          formData.append("upload_preset", CLOUDINARY_CONFIG.uploadPreset);
          formData.append("folder", state.currentFolder);
          if (hash) {
            formData.append("tags", `sha1_${hash}`);
          }

          try {
            const response = await fetch(
              `https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`,
              { method: "POST", body: formData }
            );

            if (!response.ok) {
              try {
                const data = await response.json();
                lastError = data?.error?.message || "Upload error";
              } catch (parseError) {
                lastError = "Upload error";
              }
              skippedCount += 1;
              continue;
            }

            let uploadedAsset = null;
            try {
              const data = await response.json();
              uploadedAsset = {
                public_id: data?.public_id,
                secure_url: data?.secure_url || data?.url,
                created_at: data?.created_at,
              };
            } catch (parseError) {
              uploadedAsset = null;
            }

            uploadedCount += 1;

            if (uploadedAsset?.public_id) {
              await assignPositionAfterUpload(uploadedAsset);
            }
          } catch (error) {
            skippedCount += 1;
          }
        }

        uploadButton.disabled = false;
        uploadButton.textContent = "Ajouter une photo";

        if (uploadedCount > 0) {
          statusMessage.textContent = `${uploadedCount} photo(s) ajoutee(s) avec succes.`;
          if (duplicateCount > 0) {
            statusMessage.textContent += ` ${duplicateCount} doublon(s) detecte(s).`;
          }
          if (skippedCount > 0) {
            statusMessage.textContent += ` ${skippedCount} fichier(s) ignores.`;
          }
          showView("category");
        } else if (skippedCount > 0) {
          const detail = lastError ? ` (${lastError})` : "";
          statusMessage.textContent = `Aucune photo envoyee. Fichiers trop lourds ou erreurs.${detail}`;
        } else if (duplicateCount > 0) {
          statusMessage.textContent = "Aucune photo envoyee. Doublons detectes.";
        } else {
          statusMessage.textContent = "";
        }
      }

      const dragState = {
        pointerId: null,
        longPressTimer: null,
        draggingEl: null,
        placeholderEl: null,
        ghostEl: null,
        startX: 0,
        startY: 0,
        lastX: 0,
        lastY: 0,
        autoScrollVelocity: 0,
        scrollRaf: null,
        active: false,
      };

      function handleGlobalTouchMove(event) {
        if (!dragState.active) {
          return;
        }
        event.preventDefault();
      }

      function clearDragState() {
        if (dragState.longPressTimer) {
          clearTimeout(dragState.longPressTimer);
        }
        dragState.longPressTimer = null;
        dragState.pointerId = null;
        dragState.active = false;
        dragState.autoScrollVelocity = 0;
        if (dragState.scrollRaf) {
          cancelAnimationFrame(dragState.scrollRaf);
        }
        dragState.scrollRaf = null;
        if (dragState.draggingEl) {
          dragState.draggingEl.classList.remove("dragging");
        }
        dragState.draggingEl = null;
        if (dragState.placeholderEl) {
          dragState.placeholderEl.remove();
        }
        dragState.placeholderEl = null;
        if (dragState.ghostEl) {
          dragState.ghostEl.remove();
        }
        dragState.ghostEl = null;
        document.body.style.userSelect = "";
        document.body.style.webkitUserSelect = "";
        document.body.style.overflow = "";
        document.body.style.touchAction = "";
      }

      function createGhost(target) {
        const rect = target.getBoundingClientRect();
        const ghost = target.cloneNode(true);
        ghost.classList.add("drag-ghost");
        ghost.style.width = `${rect.width}px`;
        ghost.style.height = `${rect.height}px`;
        document.body.appendChild(ghost);
        dragState.ghostEl = ghost;
      }

      function moveGhost(x, y) {
        if (!dragState.ghostEl) {
          return;
        }
        dragState.ghostEl.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
      }

      function updateAutoScroll(pointerY) {
        const edgeSize = 90;
        const maxSpeed = 10;
        let velocity = 0;

        if (pointerY < edgeSize) {
          const intensity = (edgeSize - pointerY) / edgeSize;
          velocity = -Math.max(1, intensity * maxSpeed);
        } else if (pointerY > window.innerHeight - edgeSize) {
          const intensity = (pointerY - (window.innerHeight - edgeSize)) / edgeSize;
          velocity = Math.max(1, intensity * maxSpeed);
        }

        dragState.autoScrollVelocity = velocity;

        if (!dragState.scrollRaf && velocity !== 0) {
          const step = () => {
            if (!dragState.active || dragState.autoScrollVelocity === 0) {
              dragState.scrollRaf = null;
              return;
            }
            window.scrollBy(0, dragState.autoScrollVelocity);
            moveGhost(dragState.lastX, dragState.lastY);
            dragState.scrollRaf = requestAnimationFrame(step);
          };
          dragState.scrollRaf = requestAnimationFrame(step);
        }
      }

      function startDrag(target, x, y) {
        dragState.active = true;
        dragState.draggingEl = target;
        target.classList.add("dragging");
        dragState.placeholderEl = document.createElement("div");
        dragState.placeholderEl.className = "order-item order-placeholder";
        dragState.placeholderEl.style.width = `${target.offsetWidth}px`;
        dragState.placeholderEl.style.height = `${target.offsetHeight}px`;
        orderGrid.insertBefore(dragState.placeholderEl, target.nextSibling);
        createGhost(target);
        moveGhost(x, y);
        document.body.style.userSelect = "none";
        document.body.style.webkitUserSelect = "none";
        document.body.style.overflow = "hidden";
        document.body.style.touchAction = "none";
      }

      function handlePointerDown(event) {
        const target = event.target.closest(".order-item");
        if (!target) {
          return;
        }

        dragState.pointerId = event.pointerId;
        dragState.startX = event.clientX;
        dragState.startY = event.clientY;
        dragState.lastX = event.clientX;
        dragState.lastY = event.clientY;
        dragState.longPressTimer = setTimeout(
          () => startDrag(target, event.clientX, event.clientY),
          320
        );
      }

      function handlePointerMove(event) {
        if (dragState.pointerId !== event.pointerId) {
          return;
        }

        if (!dragState.active) {
          const deltaX = event.clientX - dragState.startX;
          const deltaY = event.clientY - dragState.startY;
          if (Math.hypot(deltaX, deltaY) > 6 && dragState.longPressTimer) {
            clearTimeout(dragState.longPressTimer);
            dragState.longPressTimer = null;
          }
          return;
        }

        event.preventDefault();
        dragState.lastX = event.clientX;
        dragState.lastY = event.clientY;
        moveGhost(event.clientX, event.clientY);

        updateAutoScroll(event.clientY);

        const element = document.elementFromPoint(event.clientX, event.clientY);
        const overItem = element ? element.closest(".order-item") : null;
        if (
          !overItem ||
          overItem === dragState.draggingEl ||
          overItem === dragState.placeholderEl
        ) {
          return;
        }

        const items = Array.from(orderGrid.children);
        const draggingIndex = items.indexOf(dragState.placeholderEl);
        const overIndex = items.indexOf(overItem);
        if (draggingIndex === -1 || overIndex === -1) {
          return;
        }

        if (overIndex > draggingIndex) {
          orderGrid.insertBefore(dragState.placeholderEl, overItem.nextSibling);
        } else {
          orderGrid.insertBefore(dragState.placeholderEl, overItem);
        }
        updateOrderIndexes();
      }

      function handlePointerUp(event) {
        if (dragState.pointerId !== event.pointerId) {
          return;
        }

        if (dragState.active) {
          if (dragState.placeholderEl && dragState.draggingEl) {
            orderGrid.insertBefore(dragState.draggingEl, dragState.placeholderEl);
          }
          syncStateFromDom();
        }
        clearDragState();
      }

      document.getElementById("backToCategories").addEventListener("click", () => {
        showView("category");
      });

      document.getElementById("backToSubcategories").addEventListener("click", () => {
        if (state.currentCategory && state.currentCategory.subcategories) {
          showView("subcategory");
        } else {
          showView("category");
        }
      });

      uploadButton.addEventListener("click", openUploadWidget);

      saveOrderButton.addEventListener("click", saveCurrentOrder);

      orderGrid.addEventListener("pointerdown", handlePointerDown);
      orderGrid.addEventListener("pointermove", handlePointerMove);
      orderGrid.addEventListener("pointerup", handlePointerUp);
      orderGrid.addEventListener("pointercancel", handlePointerUp);
      orderGrid.addEventListener("contextmenu", (event) => event.preventDefault());
      orderGrid.addEventListener("dragstart", (event) => event.preventDefault());
      document.addEventListener("touchmove", handleGlobalTouchMove, { passive: false });

      fileInput.addEventListener("change", (event) => {
        const files = Array.from(event.target.files || []);
        if (!files.length) {
          return;
        }
        uploadFiles(files);
      });

      showView("category");
      renderCategories();
    </script>
  </body>
</html>
