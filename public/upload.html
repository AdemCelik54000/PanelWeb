<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Web Menu</title>
    <meta name="theme-color" content="#0b1220" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <script src="https://widget.cloudinary.com/v2.0/global/all.js" type="text/javascript"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #0b1220;
        --bg-2: #101c36;
        --card: rgba(248, 250, 252, 0.94);
        --ink: #0b1220;
        --muted: #475569;
        --accent: #f97316;
        --accent-2: #38bdf8;
        --success: #22c55e;
        --border: rgba(15, 23, 42, 0.12);
        --shadow: 0 18px 44px rgba(2, 6, 23, 0.32);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overscroll-behavior: none;
        background: radial-gradient(
            1200px 800px at 20% -10%,
            rgba(56, 189, 248, 0.30),
            transparent 55%
          ),
          radial-gradient(
            900px 700px at 90% 10%,
            rgba(249, 115, 22, 0.22),
            transparent 60%
          ),
          linear-gradient(180deg, var(--bg-2), var(--bg-1) 55%, #020617);
        background-color: var(--bg-1);
      }

      body {
        font-family: "Manrope", system-ui, sans-serif;
        color: var(--ink);
        min-height: 100svh;
        padding: calc(24px + env(safe-area-inset-top)) 16px
          calc(40px + env(safe-area-inset-bottom));
        overflow-y: auto;
        position: static;
      }

      @supports (backdrop-filter: blur(8px)) {
        .card {
          backdrop-filter: blur(10px);
        }
      }

      .shell {
        max-width: 560px;
        margin: 0 auto;
        position: relative;
        min-height: calc(100svh - 64px);
      }

      header {
        color: #f8fafc;
        text-align: left;
        padding: 6px 4px 8px;
      }

      header h1 {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      header p {
        margin-top: 6px;
        font-size: 14px;
        color: rgba(248, 250, 252, 0.8);
      }

      .card {
        background: var(--card);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 16px;
        border: 1px solid var(--border);
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .card + .card {
        margin-top: 16px;
      }

      .admin-card {
        gap: 12px;
        margin-bottom: 16px;
      }

      .admin-select {
        border-radius: 10px;
        border: 1px solid rgba(15, 23, 42, 0.2);
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
        background: #ffffff;
      }

      .section-title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 10px;
        color: var(--ink);
      }

      .grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        flex: 1;
        align-content: start;
      }

      @media (max-width: 380px) {
        body {
          padding-left: 12px;
          padding-right: 12px;
        }

        header h1 {
          font-size: 22px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .btn-upload {
          grid-column: auto;
        }
      }

      .btn {
        width: 100%;
        border: none;
        background: #111827;
        color: #f8fafc;
        padding: 12px 12px;
        font-size: 14px;
        font-weight: 700;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.25);
      }

      .btn:active {
        transform: scale(0.98);
        box-shadow: 0 6px 14px rgba(15, 23, 42, 0.22);
      }

      .btn-secondary {
        background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
      }

      .btn-tertiary {
        background: linear-gradient(135deg, #ea580c, #f97316);
      }

      .btn-upload {
        background: linear-gradient(135deg, #10b981, #22c55e);
        font-size: 15px;
        justify-content: center;
        gap: 8px;
        grid-column: span 2;
      }

      .btn-save {
        background: linear-gradient(135deg, #dc2626, #ef4444);
        font-size: 18px;
        justify-content: center;
        margin-bottom: 16px;
      }

      .btn-select {
        background: #e2e8f0;
        color: #0f172a;
        box-shadow: none;
        font-size: 13px;
        padding: 8px 12px;
      }

      .btn-select.active {
        background: linear-gradient(135deg, #10b981, #22c55e);
        color: #ffffff;
        box-shadow: 0 8px 16px rgba(16, 185, 129, 0.35);
      }

      .btn-split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .btn-split .btn {
        font-size: 18px;
        padding: 16px 18px;
      }

      .btn-split .btn-save {
        margin-bottom: 0;
      }

      .btn-download {
        background: linear-gradient(135deg, #2563eb, #0ea5e9);
      }

      .btn-back {
        background: #e2e8f0;
        color: #0f172a;
        box-shadow: none;
        font-size: 13px;
        padding: 8px 12px;
        justify-content: flex-start;
        gap: 8px;
        margin-bottom: 10px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(14, 165, 233, 0.12);
        color: #0c4a6e;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .logout-tag {
        border: none;
        cursor: pointer;
      }

      .path-box {
        margin: 10px 0 12px;
        padding: 10px 12px;
        border-radius: 12px;
        background: #ecfdf5;
        border: 1px solid rgba(16, 185, 129, 0.3);
        font-size: 12px;
        color: #065f46;
        word-break: break-all;
      }

      .helper {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }

      .hidden {
        display: none;
      }

      body.locked {
        overflow: hidden;
      }

      body.locked .shell {
        display: none;
      }

      .login-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
        background: radial-gradient(circle at top, rgba(15, 23, 42, 0.85), rgba(2, 6, 23, 0.98));
        z-index: 2000;
      }

      .login-overlay.active {
        display: flex;
      }

      .login-card {
        width: min(420px, 100%);
        background: #f8fafc;
        border-radius: 18px;
        padding: 20px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
      }

      .login-form {
        display: grid;
        gap: 12px;
      }

      .login-input {
        border-radius: 10px;
        border: 1px solid rgba(15, 23, 42, 0.2);
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
      }

      .login-btn {
        width: 100%;
        border: none;
        background: linear-gradient(135deg, #0ea5e9, #2563eb);
        color: #ffffff;
        padding: 12px;
        border-radius: 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }

      .login-error {
        margin-top: 10px;
        font-size: 12px;
        color: #dc2626;
        min-height: 16px;
        text-align: center;
      }

      .status {
        margin-top: 12px;
        font-size: 14px;
        color: #0f172a;
      }

      .order-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
      }

      .order-scroll {
        flex: 1;
        min-height: 200px;
        max-height: none;
        overflow: visible;
        border-radius: 14px;
        background: #ffffff;
        border: 1px solid var(--border);
        padding: 12px;
      }

      .order-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .order-item {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        background: #e2e8f0;
        aspect-ratio: 1 / 1;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
      }

      .order-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      .order-item.dragging {
        opacity: 0.55;
        transform: scale(0.96);
      }

      .order-placeholder {
        border: 2px dashed rgba(15, 23, 42, 0.25);
        background: rgba(15, 23, 42, 0.04);
        box-shadow: none;
      }

      .drag-ghost {
        position: fixed;
        top: 0;
        left: 0;
        width: 96px;
        height: 96px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.35);
        z-index: 9999;
        pointer-events: none;
        transform: translate(-50%, -50%);
      }

      .order-index {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: rgba(15, 23, 42, 0.75);
        color: #f8fafc;
        font-size: 12px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 999px;
        user-select: none;
        -webkit-user-select: none;
      }

      .order-video-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.75);
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        user-select: none;
        -webkit-user-select: none;
      }

      .order-item.selected {
        outline: 3px solid #22c55e;
        outline-offset: -3px;
      }

      .order-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .order-empty {
        text-align: center;
        color: var(--muted);
        font-size: 14px;
        padding: 24px 12px;
      }
      @media (min-width: 680px) {
        .shell {
          padding: calc(20px + env(safe-area-inset-top)) 16px
            calc(32px + env(safe-area-inset-bottom));
        }

        .order-grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="login-overlay" id="loginOverlay" aria-hidden="true">
      <div class="login-card">
        <form id="loginForm" class="login-form">
          <input
            class="login-input"
            type="text"
            id="loginIdentifier"
            placeholder="Identifiant"
            autocomplete="username"
            required
          />
          <input
            class="login-input"
            type="password"
            id="loginPassword"
            placeholder="Mot de passe"
            autocomplete="current-password"
            required
          />
          <button class="login-btn" type="submit">Se connecter</button>
        </form>
        <div class="login-error" id="loginError" role="alert"></div>
      </div>
    </div>
    <div class="shell">
      <header>
        <button class="tag logout-tag" type="button" id="logoutButton">Deconnexion</button>
        <h1>Ajouter des photos</h1>
        <p>Sélectionnez une catégorie, puis la sous-catégorie si besoin.</p>
      </header>

      <section id="adminPanel" class="card admin-card hidden">
        <div class="section-title">Choisir un client</div>
        <select id="adminTenantSelect" class="admin-select">
          <option value="">Selectionner un client</option>
        </select>
        <div class="helper" id="adminHelper">Connecte en admin.</div>
      </section>

      <button class="btn btn-save hidden" type="button" id="saveOrderButton">
        ENREGISTRER L'ORDRE
      </button>
      <div class="btn-split hidden" id="selectionActions">
        <button class="btn btn-save" type="button" id="deleteSelectedButton">
          SUPPRIMER
        </button>
        <button class="btn btn-download" type="button" id="downloadSelectedButton">
          ENREGISTRER
        </button>
      </div>

      <section id="categoryView" class="card">
        <div class="section-title">Choisissez une catégorie</div>
        <div class="grid" id="categoryButtons"></div>
      </section>

      <section id="subcategoryView" class="card hidden">
        <button class="btn btn-back" type="button" id="backToCategories">
          ← Retour
        </button>
        <div class="section-title" id="subcategoryTitle"></div>
        <div class="grid" id="subcategoryButtons"></div>
      </section>

      <section id="uploadView" class="card hidden">
        <button class="btn btn-back" type="button" id="backToSubcategories">
          ← Retour
        </button>
        <div class="section-title" id="uploadTitle">Ajouter des photos</div>
        <div class="path-box" id="selectedPath"></div>
        <button class="btn btn-upload" type="button" id="uploadButton">
          Ajouter une photo
        </button>
        <input
          id="fileInput"
          type="file"
          accept="image/jpeg,image/png,image/webp,image/heic,image/heif"
          multiple
          class="hidden"
        />
        <div class="helper">Formats acceptés: jpg, jpeg, png, webp.</div>
        <div class="status" id="statusMessage" aria-live="polite"></div>
      </section>
      <section id="orderView" class="card order-card hidden">
        <div class="order-header">
          <div class="section-title">Ordre des photos</div>
          <button class="btn btn-select" type="button" id="selectModeButton">Selectionner</button>
        </div>
        <div class="order-scroll" id="orderScroll">
          <div class="order-grid" id="orderGrid"></div>
          <div class="order-empty hidden" id="orderEmpty">Aucune photo dans ce dossier.</div>
        </div>
        <div class="helper">Appui long pour deplacer une image.</div>
        <div class="status" id="orderStatus" aria-live="polite"></div>
      </section>
    </div>

    <script>
      const CLOUDINARY_CONFIG = {
        cloudName: "dq7d6rmbp",
        uploadPreset: "kgehqzfz",
      };
      const DUPLICATE_CHECK_ENDPOINT = "/.netlify/functions/check-image";
      const LIST_IMAGES_ENDPOINT = "/.netlify/functions/list-images";
      const SAVE_ORDER_ENDPOINT = "/.netlify/functions/save-order";
      const DELETE_ASSETS_ENDPOINT = "/.netlify/functions/delete-assets";
      const SIGN_UPLOAD_ENDPOINT = "/.netlify/functions/sign-upload";
      const LOGIN_ENDPOINT = "/.netlify/functions/login";
      const TENANT_CONFIG_ENDPOINT = "/.netlify/functions/tenant-config";
      const TENANTS_LIST_ENDPOINT = "/.netlify/functions/tenants-list";
      const DEFAULT_TENANT_ID = "celikbatiment";

      const AUTH_STORAGE_KEY = "site_session_token";
      const TENANT_OVERRIDE_STORAGE_KEY = "site_tenant_override";

      const loginOverlay = document.getElementById("loginOverlay");
      const loginForm = document.getElementById("loginForm");
      const loginIdentifier = document.getElementById("loginIdentifier");
      const loginPassword = document.getElementById("loginPassword");
      const loginError = document.getElementById("loginError");
      const logoutButton = document.getElementById("logoutButton");
      const adminPanel = document.getElementById("adminPanel");
      const adminTenantSelect = document.getElementById("adminTenantSelect");
      const adminHelper = document.getElementById("adminHelper");

      function getAuthToken() {
        return sessionStorage.getItem(AUTH_STORAGE_KEY);
      }

      function setAuthToken(token) {
        sessionStorage.setItem(AUTH_STORAGE_KEY, token);
      }

      function clearAuthToken() {
        sessionStorage.removeItem(AUTH_STORAGE_KEY);
      }

      function getSelectedTenantId() {
        return sessionStorage.getItem(TENANT_OVERRIDE_STORAGE_KEY) || "";
      }

      function setSelectedTenantId(tenantId) {
        if (tenantId) {
          sessionStorage.setItem(TENANT_OVERRIDE_STORAGE_KEY, tenantId);
        } else {
          sessionStorage.removeItem(TENANT_OVERRIDE_STORAGE_KEY);
        }
      }

      function logout() {
        clearAuthToken();
        setSelectedTenantId("");
        categories = [];
        isAuthenticated = false;
        isAdmin = false;
        selectedTenantId = "";
        state.currentCategory = null;
        state.currentFolder = null;
        state.currentLabel = null;
        state.images = [];
        state.hasManualOrder = false;
        state.selectMode = false;
        state.selectedIds = new Set();
        orderGrid.innerHTML = "";
        orderEmpty.classList.add("hidden");
        categoryButtons.innerHTML = "";
        subcategoryButtons.innerHTML = "";
        showLoginError("");
        setLocked(true);
        try {
          history.replaceState(null, "", "/upload.html");
        } catch (error) {
          // ignore history errors
        }
        try {
          location.replace("/upload.html");
        } catch (error) {
          // ignore navigation errors
        }
      }

      function setLocked(locked) {
        document.body.classList.toggle("locked", locked);
        loginOverlay.classList.toggle("active", locked);
        loginOverlay.setAttribute("aria-hidden", locked ? "false" : "true");
        if (locked) {
          if (loginIdentifier) {
            loginIdentifier.focus();
          } else if (loginPassword) {
            loginPassword.focus();
          }
        }
      }

      function showLoginError(message) {
        loginError.textContent = message || "";
      }

      function handleAuthError(message) {
        clearAuthToken();
        isAuthenticated = false;
        showLoginError(message || "Erreur d'identification.");
        setLocked(true);
      }

      async function fetchWithAuth(url, options = {}) {
        const headers = { ...(options.headers || {}) };
        const token = getAuthToken();
        if (token) {
          headers.Authorization = `Bearer ${token}`;
        }
        if (selectedTenantId) {
          headers["X-Tenant-Id"] = selectedTenantId;
        }

        const response = await fetch(url, { ...options, headers });
        if (response.status === 401) {
          handleAuthError("Session expiree.");
        }
        return response;
      }

      function setAdminMode(role) {
        isAdmin = role === "admin";
        if (!isAdmin) {
          selectedTenantId = "";
          setSelectedTenantId("");
        }
        if (adminPanel) {
          adminPanel.classList.toggle("hidden", !isAdmin);
        }
        if (adminHelper) {
          adminHelper.textContent = isAdmin
            ? "Choisissez un client pour acceder aux dossiers."
            : "";
        }
      }

      function renderTenantOptions(options) {
        if (!adminTenantSelect) {
          return;
        }
        adminTenantSelect.innerHTML = "";
        const placeholder = document.createElement("option");
        placeholder.value = "";
        placeholder.textContent = "Selectionner un client";
        adminTenantSelect.appendChild(placeholder);
        options.forEach((tenant) => {
          const opt = document.createElement("option");
          opt.value = tenant.id;
          opt.textContent = tenant.id;
          adminTenantSelect.appendChild(opt);
        });
        adminTenantSelect.value = selectedTenantId || "";
      }

      async function loadTenantOptions() {
        if (!isAdmin) {
          return;
        }
        try {
          const response = await fetchWithAuth(TENANTS_LIST_ENDPOINT);
          if (!response.ok) {
            return;
          }
          const data = await response.json();
          tenantOptions = Array.isArray(data?.tenants) ? data.tenants : [];
          renderTenantOptions(tenantOptions);
        } catch (error) {
          // ignore load errors
        }
      }

      async function loadTenantConfig() {
        if (!selectedTenantId && isAdmin) {
          categories = [];
          renderCategories();
          showView("category");
          return;
        }

        const response = await fetchWithAuth(TENANT_CONFIG_ENDPOINT);
        if (!response.ok) {
          handleAuthError("Session expiree.");
          return;
        }
        const data = await response.json();
        setAdminMode(data?.tenant?.role);
        state.currentCategory = null;
        state.currentFolder = null;
        state.currentLabel = null;
        state.images = [];
        state.selectMode = false;
        state.selectedIds = new Set();
        orderGrid.innerHTML = "";
        orderEmpty.classList.add("hidden");
        categories = Array.isArray(data?.tenant?.folders) ? data.tenant.folders : [];
        setLocked(false);
        renderCategories();
        showView("category");
      }

      async function authenticate(identifier, password) {
        const submitButton = loginForm.querySelector("button[type=\"submit\"]");
        if (submitButton) {
          submitButton.disabled = true;
        }

        try {
          const response = await fetch(LOGIN_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ identifier, password }),
          });

          if (!response.ok) {
            handleAuthError("Erreur d'identification.");
            return;
          }

          const data = await response.json();
          if (!data?.token) {
            handleAuthError("Erreur d'identification.");
            return;
          }

          setAuthToken(data.token);
          isAuthenticated = true;
          setAdminMode(data?.tenant?.role);
          selectedTenantId = getSelectedTenantId();
          if (isAdmin) {
            setLocked(false);
            await loadTenantOptions();
            if (selectedTenantId) {
              await loadTenantConfig();
            } else {
              categories = [];
              renderCategories();
              showView("category");
            }
          } else {
            categories = Array.isArray(data?.tenant?.folders) ? data.tenant.folders : [];
            setLocked(false);
            renderCategories();
            showView("category");
          }
          loginIdentifier.value = "";
        } catch (error) {
          handleAuthError("Erreur d'identification.");
        } finally {
          if (submitButton) {
            submitButton.disabled = false;
          }
        }
      }

      async function bootstrapAuth() {
        const token = getAuthToken();
        if (!token) {
          isAuthenticated = false;
          setLocked(true);
          return;
        }

        try {
          isAuthenticated = false;
          const tenantResponse = await fetchWithAuth(TENANT_CONFIG_ENDPOINT);
          if (!tenantResponse.ok) {
            handleAuthError("Session expiree.");
            return;
          }
          const data = await tenantResponse.json();
          isAuthenticated = true;
          setAdminMode(data?.tenant?.role);
          selectedTenantId = getSelectedTenantId();
          if (isAdmin) {
            setLocked(false);
            await loadTenantOptions();
            if (selectedTenantId) {
              await loadTenantConfig();

      async function computeSha1(file) {
        const buffer = await file.arrayBuffer();
        const digest = await crypto.subtle.digest("SHA-1", buffer);
        const hashArray = Array.from(new Uint8Array(digest));
        return hashArray.map((byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      async function checkDuplicate(hash) {
        try {
          const response = await fetchWithAuth(
            `${DUPLICATE_CHECK_ENDPOINT}?hash=${encodeURIComponent(hash)}`
          );
          if (!response.ok) {
            return false;
          }
          const data = await response.json();
          return Boolean(data?.exists);
        } catch (error) {
          return false;
        }
      }

      function parsePosition(rawPosition) {

      function buildVideoThumbnail(publicId) {
        if (!publicId) {
          return "";
        }
        return `https://res.cloudinary.com/${CLOUDINARY_CONFIG.cloudName}/video/upload/so_0,f_jpg/${publicId}.jpg`;
      }

      function buildImagePreviewUrl(url) {
        if (!url) {
          return "";
        }
        const marker = "/image/upload/";
        const idx = url.indexOf(marker);
        if (idx === -1) {
          return url;
        }
        const transform = "f_auto,q_auto:eco,w_480,h_480,c_fill";
        return `${url.slice(0, idx + marker.length)}${transform}/${url.slice(
          idx + marker.length
        )}`;
      }

      function detectManualOrder(items) {
        return items.length > 0 && items.every((item) => Number.isFinite(item.position));
      }

      function sortImages(items) {
        if (state.hasManualOrder) {
          return items
            .slice()
            .sort((a, b) => (a.position || 0) - (b.position || 0));
        }
        return items
          .slice()
          .sort((a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime());
      }

      function renderOrderGrid() {

          const img = document.createElement("img");
          img.src =

              ? buildVideoThumbnail(image.public_id)

          img.alt = state.currentLabel || "Photo chantier";
          img.loading = "lazy";

          const data = await response.json();

          const normalized = items.map((item) => ({
            public_id: item.public_id,
            secure_url: item.secure_url,
            created_at: item.created_at,
            kind: item.resource_type === "video" ? "video" : "image",

          }));

          state.hasManualOrder = detectManualOrder(normalized);
          state.images = sortImages(normalized);

        } catch (error) {
          console.error("Cloudinary list error", {
            folder: state.currentFolder,

      async function saveOrderPayload(items) {
        if (!items.length) {
          return false;
        }
        try {

      async function saveCurrentOrder() {
        if (!state.images.length) {
          orderStatus.textContent = "Aucune photo a enregistrer.";
          return;
        }
        orderStatus.textContent = "Enregistrement de l'ordre...";
        saveOrderButton.disabled = true;
        saveOrderButton.textContent = "ENREGISTREMENT...";

        const orderedIds = getOrderedPublicIds();
        const payload = orderedIds.map((id, index) => {
          const item = state.images.find((image) => image.public_id === id);
          return {
            public_id: id,
            position: index + 1,
            resource_type: item?.kind === "video" ? "video" : "image",
          };
        });

        const success = await saveOrderPayload(payload);

        saveOrderButton.disabled = false;
        saveOrderButton.textContent = "ENREGISTRER L'ORDRE";

        if (!success) {
          orderStatus.textContent = "Erreur lors de l'enregistrement.";
          return;
        }

        state.images = state.images.map((image) => {
          const idx = orderedIds.indexOf(image.public_id);
          return { ...image, position: idx + 1 };
        });
        state.hasManualOrder = true;
        state.images = sortImages(state.images);
        renderOrderGrid();
        orderStatus.textContent = "Ordre sauvegarde.";
      }

      async function assignPositionAfterUpload(uploadedAsset) {
        if (!uploadedAsset?.public_id) {
          return;
        }

        const existing = state.images.slice();
        const hasFullPositions = detectManualOrder(existing);
        if (!hasFullPositions) {
          const orderedIds = getOrderedPublicIds();
          const orderedImages = orderedIds
            .map((id) => existing.find((image) => image.public_id === id))
            .filter(Boolean);

          const baseImages = orderedImages.length
            ? orderedImages
            : existing.slice().sort((a, b) => {
                return new Date(a.created_at).getTime() - new Date(b.created_at).getTime();
              });

          const updatedImages = baseImages.concat({
            ...uploadedAsset,
            position: baseImages.length + 1,
          });
          const payload = updatedImages.map((image, index) => ({
            public_id: image.public_id,
            position: index + 1,
            resource_type: image.kind === "video" ? "video" : "image",
          }));
          const success = await saveOrderPayload(payload);
          if (success) {
            state.images = updatedImages.map((image, index) => ({
              ...image,
              position: index + 1,
            }));
            state.hasManualOrder = true;
            renderOrderGrid();
          }
          return;
        }

        const maxPosition = existing.reduce((max, image) => {
          return Number.isFinite(image.position) ? Math.max(max, image.position) : max;
        }, 0);
        const nextPosition = maxPosition + 1;
        const success = await saveOrderPayload([
          {
            public_id: uploadedAsset.public_id,
            position: nextPosition,
            resource_type: "image",
          },
        ]);
        if (success) {
          state.images = sortImages(
            existing.concat({ ...uploadedAsset, position: nextPosition })
          );
          renderOrderGrid();
        }
      }

      async function uploadFiles(files) {
        const maxFileSize = 120000000;
        let uploadedCount = 0;
        let skippedCount = 0;
        let duplicateCount = 0;
        let lastError = "";
        const seenHashes = new Set();

        uploadButton.disabled = true;
        uploadButton.textContent = "Upload en cours...";
        statusMessage.textContent = "Verification des doublons...";

        for (const file of files) {
          if (file.size > maxFileSize) {
            skippedCount += 1;
            continue;
          }

          let hash = "";
          try {
            hash = await computeSha1(file);
          } catch (error) {
            hash = "";
          }

          if (hash) {
            if (seenHashes.has(hash)) {
              duplicateCount += 1;
              continue;
            }
            seenHashes.add(hash);
          }

          if (hash) {
            const exists = await checkDuplicate(hash);
            if (exists) {
              duplicateCount += 1;
              continue;
            }
          }

          const signaturePayload = await getUploadSignature({
            folder: state.currentFolder,
            hash,
          });
          if (!signaturePayload?.signature || !signaturePayload?.timestamp) {
            skippedCount += 1;
            lastError = "Signature upload invalide";
            continue;
          }

          const uploadFolder = signaturePayload.folder || state.currentFolder;
          const uploadTags = signaturePayload.tags || "";
          const formData = new FormData();
          formData.append("file", file);
          formData.append("folder", uploadFolder);
          formData.append("upload_preset", CLOUDINARY_CONFIG.uploadPreset);
          formData.append("timestamp", signaturePayload.timestamp);
          formData.append("signature", signaturePayload.signature);
          formData.append("api_key", signaturePayload.api_key);
          if (uploadTags) {
            formData.append("tags", uploadTags);
          }

          try {
            const response = await fetch(
              `https://api.cloudinary.com/v1_1/${CLOUDINARY_CONFIG.cloudName}/image/upload`,
              { method: "POST", body: formData }
            );

            if (!response.ok) {
              try {
                const data = await response.json();
                lastError = data?.error?.message || "Upload error";
              } catch (parseError) {
                lastError = "Upload error";
              }
              skippedCount += 1;
              continue;
            }

            let uploadedAsset = null;
            try {
              const data = await response.json();
              uploadedAsset = {
                public_id: data?.public_id,
                secure_url: data?.secure_url || data?.url,
                created_at: data?.created_at,
              };
            } catch (parseError) {
              uploadedAsset = null;
            }

            uploadedCount += 1;

            if (uploadedAsset?.public_id) {
              await assignPositionAfterUpload(uploadedAsset);
            }
          } catch (error) {
            skippedCount += 1;
          }
        }

        uploadButton.disabled = false;
        uploadButton.textContent = "Ajouter une photo";

        if (uploadedCount > 0) {
          statusMessage.textContent = `${uploadedCount} photo(s) ajoutee(s) avec succes.`;
          if (duplicateCount > 0) {
            statusMessage.textContent += ` ${duplicateCount} doublon(s) detecte(s).`;
          }
          if (skippedCount > 0) {
            statusMessage.textContent += ` ${skippedCount} fichier(s) ignores.`;
          }
          showView("category");
        } else if (skippedCount > 0) {
          const detail = lastError ? ` (${lastError})` : "";
          statusMessage.textContent = `Aucune photo envoyee. Fichiers trop lourds ou erreurs.${detail}`;
        } else if (duplicateCount > 0) {
          statusMessage.textContent = "Aucune photo envoyee. Doublons detectes.";
        } else {
          statusMessage.textContent = "";
        }
      }

      const dragState = {
        pointerId: null,
        longPressTimer: null,
        draggingEl: null,
        placeholderEl: null,
        ghostEl: null,
        startX: 0,
        startY: 0,
        lastX: 0,
        lastY: 0,
        autoScrollVelocity: 0,
        scrollRaf: null,
        active: false,
      };

      function handleGlobalTouchMove(event) {
        if (!dragState.active) {
          return;
        }
        event.preventDefault();
      }

      function clearDragState() {
        if (dragState.longPressTimer) {
          clearTimeout(dragState.longPressTimer);
        }
        dragState.longPressTimer = null;
        dragState.pointerId = null;
        dragState.active = false;
        dragState.autoScrollVelocity = 0;
        if (dragState.scrollRaf) {
          cancelAnimationFrame(dragState.scrollRaf);
        }
        dragState.scrollRaf = null;
        if (dragState.draggingEl) {
          dragState.draggingEl.classList.remove("dragging");
        }
        dragState.draggingEl = null;
        if (dragState.placeholderEl) {
          dragState.placeholderEl.remove();
        }
        dragState.placeholderEl = null;
        if (dragState.ghostEl) {
          dragState.ghostEl.remove();
        }
        dragState.ghostEl = null;
        document.body.style.userSelect = "";
        document.body.style.webkitUserSelect = "";
        document.body.style.overflow = "";
        document.body.style.touchAction = "";
      }

      function createGhost(target) {
        const rect = target.getBoundingClientRect();
        const ghost = target.cloneNode(true);
        ghost.classList.add("drag-ghost");
        ghost.style.width = `${rect.width}px`;
        ghost.style.height = `${rect.height}px`;
        document.body.appendChild(ghost);
        dragState.ghostEl = ghost;
      }

      function moveGhost(x, y) {
        if (!dragState.ghostEl) {
          return;
        }
        dragState.ghostEl.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
      }

      function updateAutoScroll(pointerY) {
        const edgeSize = 90;
        const maxSpeed = 10;
        let velocity = 0;

        if (pointerY < edgeSize) {
          const intensity = (edgeSize - pointerY) / edgeSize;
          velocity = -Math.max(1, intensity * maxSpeed);
        } else if (pointerY > window.innerHeight - edgeSize) {
          const intensity = (pointerY - (window.innerHeight - edgeSize)) / edgeSize;
          velocity = Math.max(1, intensity * maxSpeed);
        }

        dragState.autoScrollVelocity = velocity;

        if (!dragState.scrollRaf && velocity !== 0) {
          const step = () => {
            if (!dragState.active || dragState.autoScrollVelocity === 0) {
              dragState.scrollRaf = null;
              return;
            }
            window.scrollBy(0, dragState.autoScrollVelocity);
            moveGhost(dragState.lastX, dragState.lastY);
            dragState.scrollRaf = requestAnimationFrame(step);
          };
          dragState.scrollRaf = requestAnimationFrame(step);
        }
      }

      async function deleteSelectedAssets() {
        if (state.selectedIds.size === 0) {
          orderStatus.textContent = "Aucune selection.";
          return;
        }
        const items = state.images
          .filter((image) => state.selectedIds.has(image.public_id))
          .map((image) => ({
            public_id: image.public_id,
            resource_type: image.kind === "video" ? "video" : "image",
          }));

        orderStatus.textContent = "Suppression en cours...";
        deleteSelectedButton.disabled = true;
        downloadSelectedButton.disabled = true;

        let success = false;
        try {
          const response = await fetchWithAuth(DELETE_ASSETS_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items }),
          });
          success = response.ok;
        } catch (error) {
          success = false;
        }

        deleteSelectedButton.disabled = false;
        downloadSelectedButton.disabled = false;

        if (!success) {
          orderStatus.textContent = "Erreur lors de la suppression.";
          return;
        }

        orderStatus.textContent = "Suppression terminee.";
        state.selectMode = false;
        resetSelection();
        updateSelectionModeUI();
        await loadImagesForFolder();
      }

      function getFilenameFromUrl(url, publicId) {
        if (!url) {
          return publicId ? publicId.split("/").pop() : "media";
        }
        try {
          const parsed = new URL(url);
          const parts = parsed.pathname.split("/");
          return parts[parts.length - 1] || publicId?.split("/").pop() || "media";
        } catch (error) {
          return publicId ? publicId.split("/").pop() : "media";
        }
      }

      async function downloadSelectedAssets() {
        if (state.selectedIds.size === 0) {
          orderStatus.textContent = "Aucune selection.";
          return;
        }
        const items = state.images.filter((image) => state.selectedIds.has(image.public_id));
        orderStatus.textContent = "Telechargement en cours...";
        deleteSelectedButton.disabled = true;
        downloadSelectedButton.disabled = true;

        for (const item of items) {
          const url = item.secure_url;
          if (!url) {
            continue;
          }
          try {
            const response = await fetch(url);
            if (!response.ok) {
              continue;
            }
            const blob = await response.blob();
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = getFilenameFromUrl(url, item.public_id);
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(link.href);
          } catch (error) {
            continue;
          }
        }

        deleteSelectedButton.disabled = false;
        downloadSelectedButton.disabled = false;
        orderStatus.textContent = "Telechargement termine.";
        state.selectMode = false;
        resetSelection();
        updateSelectionModeUI();
        renderOrderGrid();
      }

      function startDrag(target, x, y) {
        dragState.active = true;
        dragState.draggingEl = target;
        target.classList.add("dragging");
        dragState.placeholderEl = document.createElement("div");
        dragState.placeholderEl.className = "order-item order-placeholder";
        dragState.placeholderEl.style.width = `${target.offsetWidth}px`;
        dragState.placeholderEl.style.height = `${target.offsetHeight}px`;
        orderGrid.insertBefore(dragState.placeholderEl, target.nextSibling);
        createGhost(target);
        moveGhost(x, y);
        document.body.style.userSelect = "none";
        document.body.style.webkitUserSelect = "none";
        document.body.style.overflow = "hidden";
        document.body.style.touchAction = "none";
      }

      function handlePointerDown(event) {
        const target = event.target.closest(".order-item");
        if (!target) {
          return;
        }
        if (state.selectMode) {
          return;
        }

        dragState.pointerId = event.pointerId;
        dragState.startX = event.clientX;
        dragState.startY = event.clientY;
        dragState.lastX = event.clientX;
        dragState.lastY = event.clientY;
        dragState.longPressTimer = setTimeout(
          () => startDrag(target, event.clientX, event.clientY),
          320
        );
      }

      function handlePointerMove(event) {
        if (dragState.pointerId !== event.pointerId) {
          return;
        }
        if (state.selectMode) {
          return;
        }

        if (!dragState.active) {
          const deltaX = event.clientX - dragState.startX;
          const deltaY = event.clientY - dragState.startY;
          if (Math.hypot(deltaX, deltaY) > 6 && dragState.longPressTimer) {
            clearTimeout(dragState.longPressTimer);
            dragState.longPressTimer = null;
          }
          return;
        }

        event.preventDefault();
        dragState.lastX = event.clientX;
        dragState.lastY = event.clientY;
        moveGhost(event.clientX, event.clientY);

        updateAutoScroll(event.clientY);

        const element = document.elementFromPoint(event.clientX, event.clientY);
        const overItem = element ? element.closest(".order-item") : null;
        if (
          !overItem ||
          overItem === dragState.draggingEl ||
          overItem === dragState.placeholderEl
        ) {
          return;
        }

        const items = Array.from(orderGrid.children);
        const draggingIndex = items.indexOf(dragState.placeholderEl);
        const overIndex = items.indexOf(overItem);
        if (draggingIndex === -1 || overIndex === -1) {
          return;
        }

        if (overIndex > draggingIndex) {
          orderGrid.insertBefore(dragState.placeholderEl, overItem.nextSibling);
        } else {
          orderGrid.insertBefore(dragState.placeholderEl, overItem);
        }
        updateOrderIndexes();
      }

      function handlePointerUp(event) {
        if (dragState.pointerId !== event.pointerId) {
          return;
        }
        if (state.selectMode) {
          clearDragState();
          return;
        }

        if (dragState.active) {
          if (dragState.placeholderEl && dragState.draggingEl) {
            orderGrid.insertBefore(dragState.draggingEl, dragState.placeholderEl);
          }
          syncStateFromDom();
        }
        clearDragState();
      }

      document.getElementById("backToCategories").addEventListener("click", () => {
        showView("category");
      });

      document.getElementById("backToSubcategories").addEventListener("click", () => {
        const hasSubcategories =
          state.currentCategory &&
          Array.isArray(state.currentCategory.subcategories) &&
          state.currentCategory.subcategories.length > 0;
        if (hasSubcategories) {
          showView("subcategory");
        } else {
          showView("category");
        }
      });

      if (adminTenantSelect) {
        adminTenantSelect.addEventListener("change", async (event) => {
          selectedTenantId = event.target.value;
          setSelectedTenantId(selectedTenantId);
          await loadTenantConfig();
        });
      }

      uploadButton.addEventListener("click", openUploadWidget);

      saveOrderButton.addEventListener("click", saveCurrentOrder);
      selectModeButton.addEventListener("click", toggleSelectMode);
      deleteSelectedButton.addEventListener("click", deleteSelectedAssets);
      downloadSelectedButton.addEventListener("click", downloadSelectedAssets);
      logoutButton.addEventListener("click", logout);

      orderGrid.addEventListener("pointerdown", handlePointerDown);
      orderGrid.addEventListener("pointermove", handlePointerMove);
      orderGrid.addEventListener("pointerup", handlePointerUp);
      orderGrid.addEventListener("pointercancel", handlePointerUp);
      orderGrid.addEventListener("contextmenu", (event) => event.preventDefault());
      orderGrid.addEventListener("dragstart", (event) => event.preventDefault());
      orderGrid.addEventListener("click", (event) => {
        if (!state.selectMode || dragState.active) {
          return;
        }
        const target = event.target.closest(".order-item");
        if (!target) {
          return;
        }
        toggleSelectedItem(target.dataset.publicId);
      });
      document.addEventListener("touchmove", handleGlobalTouchMove, { passive: false });
      document.addEventListener("gesturestart", (event) => event.preventDefault());
      document.addEventListener("gesturechange", (event) => event.preventDefault());
      document.addEventListener("gestureend", (event) => event.preventDefault());

      fileInput.addEventListener("change", (event) => {
        const files = Array.from(event.target.files || []);
        if (!files.length) {
          return;
        }
        uploadFiles(files);
      });

      state.selectMode = false;
      resetSelection();
      updateSelectionModeUI();
      setLocked(true);
      bootstrapAuth();

      window.addEventListener("pageshow", () => {
        if (!getAuthToken()) {
          isAuthenticated = false;
          setLocked(true);
          showLoginError("");
          return;
        }
        if (!isAuthenticated) {
          bootstrapAuth();
        }
      });
    </script>
  </body>
</html>
