<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/Abe-infologo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Abe-info</title>
    <meta name="theme-color" content="#0b1220" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-title" content="Abe-info" />
    <link rel="apple-touch-icon" href="/Abe-infologo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Abe-infologo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-1: #0b1220;
        --bg-2: #101c36;
        --card: rgba(248, 250, 252, 0.94);
        --ink: #0b1220;
        --muted: #475569;
        --accent: #f97316;
        --accent-2: #38bdf8;
        --success: #22c55e;
        --border: rgba(15, 23, 42, 0.12);
        --shadow: 0 18px 44px rgba(2, 6, 23, 0.32);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
        overscroll-behavior: none;
        background: var(--bg-1);
        background-color: var(--bg-1);
      }

      body {
        font-family: "Manrope", system-ui, sans-serif;
        color: var(--ink);
        min-height: 100svh;
        padding: calc(24px + env(safe-area-inset-top)) 16px
          calc(40px + env(safe-area-inset-bottom));
        overflow-y: auto;
        position: static;
      }

      body {
        position: relative;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(
            1200px 800px at 20% -10%,
            rgba(56, 189, 248, 0.30),
            transparent 55%
          ),
          radial-gradient(
            900px 700px at 90% 10%,
            rgba(249, 115, 22, 0.22),
            transparent 60%
          ),
          linear-gradient(180deg, var(--bg-2), var(--bg-1) 55%, #020617);
        transform: translateZ(0);
        will-change: transform;
      }

      @supports (backdrop-filter: blur(8px)) {
        .card {
          backdrop-filter: blur(10px);
        }
      }

      .shell {
        max-width: 560px;
        margin: 0 auto;
        position: relative;
        min-height: calc(100svh - 64px);
        z-index: 1;
      }

      header {
        color: #f8fafc;
        text-align: left;
        padding: 6px 4px 8px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        margin-bottom: 10px;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid rgba(15, 23, 42, 0.2);
        background: #ffffff;
        color: #0f172a;
        cursor: pointer;
        padding: 0;
        line-height: 1;
        transition: background 140ms ease, transform 140ms ease, box-shadow 140ms ease;
      }

      .icon-btn:hover {
        background: rgba(15, 23, 42, 0.04);
      }

      .icon-btn:focus {
        outline: none;
      }

      .icon-btn:focus-visible {
        box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.35);
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .icon-btn.is-loading svg {
        animation: spin 0.9s linear infinite;
      }

      .icon-btn:active {
        transform: scale(0.98);
      }

      .icon-btn svg {
        width: 18px;
        height: 18px;
        display: block;
      }

      .icon-btn[disabled] {
        opacity: 0.6;
        cursor: not-allowed;
      }

      header h1 {
        font-size: 24px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      header p {
        margin-top: 6px;
        font-size: 14px;
        color: rgba(248, 250, 252, 0.8);
      }

      .card {
        background: var(--card);
        border-radius: 18px;
        box-shadow: var(--shadow);
        padding: 16px;
        border: 1px solid var(--border);
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      .card + .card {
        margin-top: 16px;
      }

      .admin-card {
        gap: 12px;
        margin-bottom: 16px;
      }

      .admin-select {
        border-radius: 10px;
        border: 1px solid rgba(15, 23, 42, 0.2);
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
        background: #ffffff;
      }

      .section-title {
        font-size: 15px;
        font-weight: 700;
        margin-bottom: 10px;
        color: var(--ink);
      }

      .grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        flex: 1;
        align-content: start;
      }

      @media (max-width: 380px) {
        body {
          padding-left: 12px;
          grid-template-columns: 1fr 1fr 44px 44px 44px;
        }

        header h1 {
          font-size: 22px;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .btn-upload {
          grid-column: auto;
        }
      }

      .btn {
        width: 100%;
        border: none;
        background: #111827;
        color: #f8fafc;
        padding: 12px 12px;
        font-size: 14px;
        font-weight: 700;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.25);
      }

      .btn:active {
        transform: scale(0.98);
        box-shadow: 0 6px 14px rgba(15, 23, 42, 0.22);
      }

      .btn-secondary {
        background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
      }

      .btn-tertiary {
        background: linear-gradient(135deg, #ea580c, #f97316);
      }

      .btn-upload {
        background: linear-gradient(135deg, #10b981, #22c55e);
        font-size: 15px;
        justify-content: center;
        gap: 8px;
        grid-column: span 2;
      }

      .btn-save {
        background: linear-gradient(135deg, #dc2626, #ef4444);
        font-size: 18px;
        justify-content: center;
        margin-bottom: 16px;
      }

      .btn-select {
        background: #e2e8f0;
        color: #0f172a;
        box-shadow: none;
        font-size: 13px;
        padding: 8px 12px;
      }

      .btn-select.active {
        background: linear-gradient(135deg, #10b981, #22c55e);
        color: #ffffff;
        box-shadow: 0 8px 16px rgba(16, 185, 129, 0.35);
      }

      .btn-split {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 16px;
      }

      .btn-split .btn {
        font-size: 18px;
        padding: 16px 18px;
      }

      .btn-split .btn-save {
        margin-bottom: 0;
      }

      .btn-download {
        background: linear-gradient(135deg, #2563eb, #0ea5e9);
      }

      .planning-header {
        display: grid;
        grid-template-columns: 1fr auto;
        grid-template-rows: auto auto;
        gap: 10px 12px;
        align-items: center;
      }

      /* Make the controls sit on a second row by default (prevents wrapping chaos on small screens). */
      .planning-controls {
        grid-column: 1 / -1;
      }

      .planning-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .planning-menu {
        position: relative;
        display: inline-flex;
        align-items: center;
      }

      .planning-menu-panel {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        width: min(340px, 86vw);
        background: #ffffff;
        border: 1px solid rgba(15, 23, 42, 0.14);
        border-radius: 14px;
        box-shadow: 0 18px 44px rgba(2, 6, 23, 0.28);
        padding: 10px;
        z-index: 40;
        opacity: 0;
        transform: translateY(-6px) scale(0.98);
        transform-origin: top right;
        pointer-events: none;
        transition: opacity 160ms ease, transform 160ms ease;
      }

      .planning-menu-panel.open {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }

      #planningOverflowButton[aria-expanded="true"] {
        background: rgba(15, 23, 42, 0.06);
      }

      /* Mobile: keep planning overflow menu fully visible (no clipping/overflow). */
      @media (max-width: 520px) {
        .planning-menu-panel {
          position: fixed;
          left: 50%;
          right: auto;
          top: 84px;
          width: min(360px, calc(100vw - 24px));
          max-height: calc(100dvh - 120px);
          overflow: auto;
          padding: 8px;
          z-index: 4000;
          transform: translateX(-50%) translateY(-6px) scale(0.98);
          transform-origin: top center;
        }

        .planning-menu-panel.open {
          transform: translateX(-50%) translateY(0) scale(1);
        }

        .icon-btn {
          width: 34px;
          height: 34px;
        }

        .planning-menu-item {
          padding: 8px 9px;
          border-radius: 11px;
          font-size: 12px;
        }

        .planning-menu-subpanel {
          padding: 8px;
          border-radius: 11px;
        }

        .hours-editor {
          gap: 8px;
        }

        .hours-editor input[type="time"] {
          height: 34px;
          padding: 6px 8px;
          min-width: 96px;
        }

        .mini-btn {
          padding: 7px 9px;
          border-radius: 10px;
          font-size: 12px;
        }
      }

      .planning-menu-item {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border: 1px solid rgba(15, 23, 42, 0.14);
        background: #ffffff;
        color: #0f172a;
        padding: 10px 10px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 800;
        font-size: 13px;
        line-height: 1.1;
        text-align: left;
      }

      .planning-menu-item:hover {
        background: rgba(15, 23, 42, 0.04);
      }

      .planning-menu-item:active {
        transform: scale(0.99);
      }

      .planning-menu-item[disabled] {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .planning-menu-item.danger {
        background: linear-gradient(135deg, #dc2626, #ef4444);
        color: #ffffff;
        border-color: rgba(239, 68, 68, 0.55);
      }

      .planning-menu-divider {
        height: 1px;
        background: rgba(15, 23, 42, 0.10);
        margin: 10px 4px;
      }

      .planning-menu-subpanel {
        margin-top: 8px;
        padding: 10px;
        border: 1px dashed rgba(15, 23, 42, 0.18);
        border-radius: 12px;
        background: rgba(248, 250, 252, 0.82);
      }

      #planningEditToggle {
        justify-self: end;
        align-self: center;
        white-space: nowrap;
      }

      .mini-btn {
        border: 1px solid rgba(15, 23, 42, 0.2);
        background: #ffffff;
        color: #0f172a;
        padding: 8px 10px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 800;
        font-size: 13px;
        line-height: 1;
      }

      .mini-btn:active {
        transform: scale(0.98);
      }

      .mini-btn.active {
        background: linear-gradient(135deg, #10b981, #22c55e);
        color: #ffffff;
        border-color: rgba(16, 185, 129, 0.5);
      }

      .mini-btn.danger {
        background: linear-gradient(135deg, #dc2626, #ef4444);
        color: #ffffff;
        border-color: rgba(239, 68, 68, 0.55);
      }

      @keyframes pulseSave {
        0% {
          transform: scale(1);
          filter: brightness(1);
        }
        50% {
          transform: scale(1.03);
          filter: brightness(1.05);
        }
        100% {
          transform: scale(1);
          filter: brightness(1);
        }
      }

      .mini-btn.pulse {
        animation: pulseSave 0.95s ease-in-out infinite;
      }

      .planning-range {
        font-size: 13px;
        font-weight: 800;
        color: rgba(15, 23, 42, 0.8);
        padding: 0 4px;
        min-width: 140px;
        text-align: right;
      }

      .planning-week {
        margin-top: 12px;
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .planning-day-btn {
        border: 1px solid rgba(15, 23, 42, 0.16);
        background: #ffffff;
        color: #0f172a;
        border-radius: 12px;
        padding: 10px 10px;
        cursor: pointer;
        text-align: left;
      }

      .planning-day-btn,
      .planning-month-day,
      .planning-month .weekday {
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      .planning-day-btn strong {
        display: block;
        font-size: 12px;
        text-transform: capitalize;
        color: rgba(15, 23, 42, 0.85);
      }

      .planning-day-btn span {
        display: block;
        margin-top: 4px;
        font-size: 12px;
        color: rgba(71, 85, 105, 0.95);
      }

      .planning-day-btn.active {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.16), rgba(249, 115, 22, 0.12));
        border-color: rgba(56, 189, 248, 0.5);
      }

      .planning-month {
        margin-top: 12px;
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .planning-month .weekday {
        font-size: 11px;
        font-weight: 800;
        color: rgba(71, 85, 105, 0.95);
        text-align: center;
        padding: 6px 0;
      }

      .planning-month-day {
        border: 1px solid rgba(15, 23, 42, 0.12);
        background: rgba(255, 255, 255, 0.92);
        border-radius: 12px;
        padding: 10px 0;
        text-align: center;
        cursor: pointer;
        font-weight: 800;
        color: rgba(15, 23, 42, 0.9);
        touch-action: manipulation;
      }

      body.planning-painting {
        overscroll-behavior: none;
      }

      body.planning-painting .planning-month-day {
        touch-action: none;
      }

      .planning-month-day.muted {
        opacity: 0.45;
      }

      .planning-month-day.active {
        /* Selection should not hide open/closed colors */
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.38);
        border-color: rgba(56, 189, 248, 0.65);
      }

      .planning-month-day.open {
        background: rgba(34, 197, 94, 0.16);
        border-color: rgba(34, 197, 94, 0.55);
      }

      .planning-month-day.open.active {
        /* Keep the open-day background and add the selection ring */
        box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.38);
      }

      .planning-month-day.editing {
        outline: 2px dashed rgba(15, 23, 42, 0.18);
        outline-offset: 2px;
      }

      .planning-slots {
        margin-top: 14px;
        border-top: 1px solid rgba(15, 23, 42, 0.12);
        padding-top: 10px;
      }

      .slot-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px dashed rgba(15, 23, 42, 0.10);
      }

      .slot-time {
        width: 64px;
        flex: 0 0 64px;
        font-size: 12px;
        font-weight: 900;
        color: rgba(71, 85, 105, 0.95);
      }

      .slot-items {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .slot-item {
        border-radius: 12px;
        padding: 10px 12px;
        border: 1px solid rgba(56, 189, 248, 0.28);
        background: rgba(56, 189, 248, 0.10);
        color: rgba(15, 23, 42, 0.9);
        font-weight: 800;
        font-size: 13px;
      }

      .slot-item-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .slot-delete-btn {
        border: 1px solid rgba(239, 68, 68, 0.35);
        background: rgba(239, 68, 68, 0.12);
        color: #991b1b;
        border-radius: 10px;
        height: 30px;
        padding: 0 10px;
        font-weight: 800;
        font-size: 12px;
        cursor: pointer;
      }

      .slot-delete-btn:active {
        transform: scale(0.98);
      }

      .confirm-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.55);
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        z-index: 10000;
      }

      .confirm-overlay.active {
        display: flex;
      }

      .confirm-modal {
        width: min(520px, 100%);
        background: #ffffff;
        border-radius: 16px;
        border: 1px solid rgba(15, 23, 42, 0.12);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.35);
        padding: 16px;
      }

      .confirm-title {
        font-weight: 900;
        font-size: 16px;
        color: #0f172a;
        margin-bottom: 6px;
      }

      .confirm-text {
        font-size: 13px;
        color: rgba(15, 23, 42, 0.85);
        line-height: 1.35;
        margin-bottom: 14px;
      }

      .confirm-actions {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
      }

      .slot-empty {
        border: none;
        background: transparent;
        padding: 0;
        height: 12px;
      }

      .slot-item .meta {
        display: block;
        margin-top: 4px;
        font-weight: 700;
        font-size: 12px;
        color: rgba(71, 85, 105, 0.95);
      }

      @media (max-width: 520px) {
        .planning-header {
          grid-template-columns: 1fr auto;
          grid-template-rows: auto auto;
        }

        .planning-controls {
          width: 100%;
          display: grid;
          grid-template-columns: 1fr 1fr 44px 44px 44px;
          grid-template-rows: auto auto;
          gap: 8px;
          justify-content: stretch;
        }

        #planningEditToggle {
          grid-column: 1;
          grid-row: 1;
        }

        #planningModeMonth {
          grid-column: 2;
          grid-row: 1;
        }

        #planningPrev {
          grid-column: 3;
          grid-row: 1;
        }

        #planningNext {
          grid-column: 4;
          grid-row: 1;
        }

        #planningRefreshButton {
          grid-column: 5;
          grid-row: 1;
        }

        #planningRange {
          grid-column: 1 / -1;
          grid-row: 2;
          text-align: left;
          padding: 2px 0 0;
          min-width: auto;
        }

        /* Keep all mini buttons the same height and prevent weird baseline misalignment */
        .mini-btn {
          height: 36px;
          display: inline-flex;
          align-items: center;
          justify-content: center;
        }

        /* Ensure the edit toggle does not break the grid */
        #planningEditToggle {
          height: 36px;
        }

        .mini-btn {
          padding: 7px 8px;
          font-size: 12px;
          border-radius: 10px;
        }

        .planning-week {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .planning-day-btn {
          padding: 8px 9px;
        }

        .planning-day-btn strong {
          font-size: 11px;
        }

        .planning-day-btn span {
          font-size: 11px;
        }

        .planning-slots {
          max-height: 360px;
          overflow: auto;
          -webkit-overflow-scrolling: touch;
          padding-right: 4px;
        }

        .slot-row {
          padding: 5px 0;
          gap: 8px;
        }

        .slot-time {
          width: 52px;
          flex: 0 0 52px;
          font-size: 11px;
        }

        .slot-item {
          padding: 7px 9px;
          border-radius: 10px;
          font-size: 12px;
        }

        .slot-item .meta {
          font-size: 11px;
        }
      }

      .btn-back {
        background: #e2e8f0;
        color: #0f172a;
        box-shadow: none;
        font-size: 13px;
        padding: 8px 12px;
        justify-content: flex-start;
        gap: 8px;
        margin-bottom: 10px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(14, 165, 233, 0.12);
        color: #0c4a6e;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .logout-tag {
        border: none;
        cursor: pointer;
        background: #ef4444;
        color: #ffffff;
      }

      .path-box {
        margin: 10px 0 12px;
        padding: 10px 12px;
        border-radius: 12px;
        background: #ecfdf5;
        border: 1px solid rgba(16, 185, 129, 0.3);
        font-size: 12px;
        color: #065f46;
        word-break: break-all;
      }

      .helper {
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }

      .hours-editor {
        display: flex;
        align-items: end;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 8px;
      }

      .hours-editor label {
        display: grid;
        gap: 4px;
        font-size: 12px;
        color: rgba(15, 23, 42, 0.85);
        font-weight: 700;
      }

      .hours-editor input[type="time"] {
        height: 36px;
        padding: 6px 10px;
        border-radius: 10px;
        border: 1px solid rgba(15, 23, 42, 0.2);
        background: #ffffff;
        color: #0f172a;
        font-weight: 700;
        min-width: 120px;
      }

      .hidden {
        display: none;
      }

      body.locked {
        /* iPad Safari can fail to focus/type in inputs inside fixed overlays
           when the body is overflow:hidden. Keep scrolling disabled via the overlay itself. */
        overflow: auto;
      }

      body.locked .shell {
        display: none;
      }

      .login-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
        background: radial-gradient(circle at top, rgba(15, 23, 42, 0.85), rgba(2, 6, 23, 0.98));
        z-index: 2000;
        touch-action: none;
        overscroll-behavior: none;
      }

      .login-overlay.active {
        display: flex;
      }

      body.loading {
        overflow: hidden;
      }

      .global-loading-overlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
        background: radial-gradient(circle at top, rgba(15, 23, 42, 0.88), rgba(2, 6, 23, 0.98));
        z-index: 3000;
      }

      .global-loading-overlay.active {
        display: flex;

      .global-loading-card {
        width: min(460px, 100%);
        background: rgba(248, 250, 252, 0.98);

        border: 1px solid var(--border);
        display: grid;
        gap: 12px;

      .global-loading-overlay {
        touch-action: none;
        overscroll-behavior: none;
      }

      .global-loading-preview {
        display: none;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        padding: 10px;
        border-radius: 14px;
        background: #ffffff;
        border: 1px solid var(--border);
        max-height: min(42svh, 340px);
        overflow: hidden;
      }

      .global-loading-preview.active {
        display: grid;
      }

      .preview-item {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        aspect-ratio: 1 / 1;
        background: linear-gradient(135deg, rgba(226, 232, 240, 1), rgba(226, 232, 240, 0.7));
        box-shadow: 0 10px 22px rgba(15, 23, 42, 0.12);
      }

      .preview-item img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .preview-fallback {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px;
        text-align: center;
        color: #0f172a;
      }

      .preview-fallback.hidden {
        display: none;
      }

      .preview-ext {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.10);
        border: 1px solid rgba(15, 23, 42, 0.12);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .preview-name {
        font-size: 12px;
        font-weight: 700;
        color: rgba(15, 23, 42, 0.75);
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .preview-item.active {
        outline: 3px solid #22c55e;
        outline-offset: -3px;
      }

      .preview-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        padding: 4px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.02em;
        color: #f8fafc;
        background: rgba(15, 23, 42, 0.8);
        user-select: none;
        -webkit-user-select: none;
      }

      .preview-badge.delete {
        background: rgba(220, 38, 38, 0.88);
      }

      .preview-badge.upload {
        background: rgba(34, 197, 94, 0.88);
      }

      .global-loading-title {
        font-size: 16px;
        font-weight: 800;
        color: #0b1220;
      }

      .global-loading-subtitle {
        font-size: 13px;
        font-weight: 700;
        color: #0f172a;
        opacity: 0.85;
      }

      .progress-bar {
        width: 100%;
        height: 12px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.10);
        overflow: hidden;
        border: 1px solid rgba(15, 23, 42, 0.10);
      }

      .progress-bar-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #0ea5e9, #22c55e);
        border-radius: 999px;
        transition: width 0.18s ease;
      }

      .progress-bar.indeterminate .progress-bar-fill {
        width: 35%;
        animation: indeterminateBar 1.05s ease-in-out infinite;
      }

      @keyframes indeterminateBar {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }

      .progress-meta {
        margin-top: 8px;

      .login-card {

      .order-card {

      .order-scroll {

        max-height: none;

        border-radius: 14px;

        border: 1px solid var(--border);

      }

      .order-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .order-item {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        background: linear-gradient(135deg, rgba(226, 232, 240, 1), rgba(226, 232, 240, 0.65));
        aspect-ratio: 1 / 1;
        touch-action: manipulation;
        user-select: none;
        -webkit-user-select: none;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.16);
      }

      .order-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        opacity: 0;
        transition: opacity 0.22s ease;
        pointer-events: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-touch-callout: none;
      }

      .order-item img.loaded {
        opacity: 1;
      }

      .order-item.dragging {
        opacity: 0.55;
        transform: scale(0.96);
      }

      .order-placeholder {
        border: 2px dashed rgba(15, 23, 42, 0.25);
        background: rgba(15, 23, 42, 0.04);
        box-shadow: none;
      }

      .drag-ghost {
        position: fixed;
        top: 0;
        left: 0;
        width: 96px;
        height: 96px;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.35);
        z-index: 9999;
        pointer-events: none;
        transform: translate(-50%, -50%);
      }

      .order-index {
        position: absolute;
        bottom: 8px;
        right: 8px;
        background: rgba(15, 23, 42, 0.75);
        color: #f8fafc;
        font-size: 12px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 999px;
        user-select: none;
        -webkit-user-select: none;
      }

      .order-video-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        width: 28px;
        height: 28px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.75);
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        user-select: none;
        -webkit-user-select: none;
      }

      .order-item.selected {
        outline: 3px solid #22c55e;
        outline-offset: -3px;
      }

      .order-header {
        display: flex;
        align-items: center;
        justify-content: space-between;

      }

      .order-empty {
        text-align: center;
        color: var(--muted);

      @media (min-width: 680px) {

          padding: calc(20px + env(safe-area-inset-top)) 16px

      .install-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 16px;

        backdrop-filter: blur(6px);

      .install-overlay.active {
        display: flex;
      }

      .install-card {
        width: 100%;
        max-width: 560px;
        border-radius: 18px;

      .install-title {

      .install-subtitle {

      }

      .install-steps {

      .install-step {

      .install-icon {

        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.18);
      }

      .install-btn:active {
        transform: scale(0.99);
      }
    </style>
  </head>
  <body>
    <div class="install-overlay" id="installOverlay" aria-hidden="true">
      <div class="install-card" role="dialog" aria-modal="true" aria-label="Install the app">
        <div class="install-title">Install the app</div>

    <div class="login-overlay" id="loginOverlay" aria-hidden="true">

    <script>
      (function () {
        const DISMISS_SESSION_KEY = "clauddepo:install-tutorial-dismissed-session";

        const overlay = document.getElementById("installOverlay");
        const steps = document.getElementById("installSteps");
        const continueBtn = document.getElementById("installContinue");

        if (!overlay || !steps || !continueBtn) return;

        function isStandalone() {
          try {
            if (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) {
              return true;
            }
          } catch {}

          try {
            if (navigator.standalone === true) return true;
          } catch {}

          return false;
        }

        function getVariant() {
          const ua = navigator.userAgent || "";
          const platform = navigator.platform || "";
          const isAppleMobile = /iPad|iPhone|iPod/.test(ua);
          const isIPadOS13Plus = platform === "MacIntel" && (navigator.maxTouchPoints || 0) > 1;
          const isIOS = isAppleMobile || isIPadOS13Plus;

          const isSafariTokenPresent = /Safari\//.test(ua) || /Safari/.test(ua);
          const isOtherIOSBrowser = /(CriOS|FxiOS|EdgiOS|OPiOS|DuckDuckGo|GSA)/.test(ua);
          const isSafari = isSafariTokenPresent && !isOtherIOSBrowser;

          const isAndroid = /Android/.test(ua);
          const isMobile = /Mobile/.test(ua);

          if (isIOS && isSafari) return "ios-safari";
          if (isAndroid) return "android";
          if (!isMobile) return "desktop";
          return "other";
        }

        function iconSvg(name) {
          const icons = {
            share:
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V3"/><path d="M7 8l5-5 5 5"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg>',
            plus:
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>',
            menu:
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6h.01"/><path d="M12 12h.01"/><path d="M12 18h.01"/></svg>',
            download:
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>',
            phone:
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>',
            monitor:
              '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>',
          };

          return icons[name] || icons.phone;
        }

        function setSteps(variant) {
          if (variant === "ios-safari") {
            steps.innerHTML = `
              <div class="install-step">
                <div class="install-icon">${iconSvg("share")}</div>
                <div>
                  <div class="install-step-title">1) Tap “Share”</div>
                  <div class="install-step-desc">In Safari, at the bottom of the screen (share icon).</div>
                </div>

      function setGlobalLoadingPreviews({ variant, items, activeIndex = -1 } = {}) {
        if (!globalLoadingPreview) {
          return;
        }
        clearGlobalLoadingPreviews();

        const normalized = Array.isArray(items) ? items.filter(Boolean) : [];
        if (!normalized.length) {
          return;
        }

        const maxItems = 9;
        const visible = normalized.slice(0, maxItems);
        const remaining = normalized.length - visible.length;

        globalLoadingState.previewActiveIndex =
          Number.isFinite(activeIndex) ? activeIndex : -1;

        globalLoadingPreview.classList.add("active");
        globalLoadingPreview.setAttribute("aria-hidden", "false");

        visible.forEach((item, index) => {
          const cell = document.createElement("div");
          cell.className = "preview-item";
          if (index === globalLoadingState.previewActiveIndex) {
            cell.classList.add("active");
          }

          const fallback = document.createElement("div");
          fallback.className = "preview-fallback hidden";
          const ext = document.createElement("div");
          ext.className = "preview-ext";
          ext.textContent = String(item?.label || item?.type || "FILE")
            .toUpperCase()
            .slice(0, 8);
          const name = document.createElement("div");
          name.className = "preview-name";
          name.textContent = String(item?.name || "");
          fallback.appendChild(ext);
          if (name.textContent) {
            fallback.appendChild(name);
          }

          let img = null;
          if (item?.src) {
            img = document.createElement("img");
            img.decoding = "async";
            img.loading = "eager";
            img.alt = variant === "delete" ? "Deleting" : "Uploading";
            img.src = item.src;
            img.addEventListener(
              "error",
              () => {
                img.style.display = "none";
                fallback.classList.remove("hidden");
              },
              { once: true }
            );
          } else {
            fallback.classList.remove("hidden");

          const badge = document.createElement("div");
          badge.className = `preview-badge ${variant === "delete" ? "delete" : "upload"}`;
          badge.textContent = variant === "delete" ? "DEL" : "ADD";

          if (img) {
            cell.appendChild(img);
          }
          cell.appendChild(fallback);
          cell.appendChild(badge);
          globalLoadingPreview.appendChild(cell);
        });

        if (remaining > 0) {
          const cell = document.createElement("div");
          cell.className = "preview-item";
          const label = document.createElement("div");
          label.className = "preview-badge";
          label.textContent = `+${remaining}`;

      function buildPreviewItemsFromFiles(fileList) {
        const files = Array.from(fileList || []);

        const isPreviewableImage = (file) => {
          const type = String(file?.type || "").toLowerCase();
          if (!type.startsWith("image/")) {
            return false;
          }
          // HEIC/HEIF are commonly not decodable by browsers.
          if (type === "image/heic" || type === "image/heif") {
            return false;
          }
          return true;
        };

        const labelFromFile = (file) => {
          const type = String(file?.type || "").toLowerCase();
          if (type === "image/heic") return "HEIC";
          if (type === "image/heif") return "HEIF";
          if (type === "image/jpeg") return "JPG";
          if (type === "image/png") return "PNG";
          if (type === "image/webp") return "WEBP";
          if (type.startsWith("image/")) return "IMAGE";
          return "FILE";
        };

        return files
          .filter((file) => file && file.type)
          .map((file) => {
            const previewable = isPreviewableImage(file);
            let url = "";
            if (previewable) {
              url = URL.createObjectURL(file);
              globalLoadingState.previewObjectUrls.push(url);
            }
            return {
              src: url,
              name: file?.name || "",
              type: file?.type || "",
              label: labelFromFile(file),
            };
          });
      }

        const ids = Array.from(state.selectedIds || []);
        const lookup = new Map(state.images.map((image) => [image.public_id, image]));

                ? buildVideoThumbnail(image.public_id)
                : buildImagePreviewUrl(image.secure_url);
            return { src };
          });

      function setGlobalLoading({

        try {
          if (globalLoadingOverlay && globalLoadingOverlay.focus) {
            globalLoadingOverlay.tabIndex = -1;
            globalLoadingOverlay.focus({ preventScroll: true });

          // ignore focus errors

      function updateGlobalLoadingProgress({ current, total, mode } = {}) {
        if (!globalLoadingState.active) {
          return;
        }
        if (typeof mode === "string") {
          globalLoadingState.mode = mode;
        }
        if (Number.isFinite(current)) {
          globalLoadingState.current = current;
        }
        if (Number.isFinite(total)) {
          globalLoadingState.total = total;
        }

        const isDeterminate =
          globalLoadingState.mode === "determinate" &&
          globalLoadingState.total > 0;

        if (globalLoadingBar) {
          globalLoadingBar.classList.toggle("indeterminate", !isDeterminate);
        }
        if (globalLoadingBarFill) {
          if (isDeterminate) {
            const pct = Math.max(
              0,
              Math.min(
                100,
                Math.round(
                  (globalLoadingState.current / globalLoadingState.total) * 100
                )
              )
            );
            globalLoadingBarFill.style.width = `${pct}%`;
          } else {
            globalLoadingBarFill.style.width = "35%";
          }
        }
        if (globalLoadingMeta) {
          if (isDeterminate) {
            globalLoadingMeta.textContent = `${globalLoadingState.current}/${globalLoadingState.total}`;
          } else {
            globalLoadingMeta.textContent = "";
          }
        }
      }

        // Persist login on the same device across browser/app restarts.
        // Migrate legacy sessions (sessionStorage) to localStorage once.
        const legacy = sessionStorage.getItem(AUTH_STORAGE_KEY);
        if (legacy) {
          try {
            localStorage.setItem(AUTH_STORAGE_KEY, legacy);
          } catch (error) {
            // ignore storage errors
          }
          try {
            sessionStorage.removeItem(AUTH_STORAGE_KEY);
          } catch (error) {
            // ignore storage errors
          }
          return legacy;
        }
        return localStorage.getItem(AUTH_STORAGE_KEY);
      }

      function showConfirmDialog({ title, message, okText, cancelText }) {
        return new Promise((resolve) => {
          if (!confirmOverlay || !confirmOk || !confirmCancel) {
            resolve(window.confirm(message || "Confirm?"));
            return;
          }

          if (confirmTitle) {
            confirmTitle.textContent = title || "Confirm";
          }
          if (confirmText) {
            confirmText.textContent = message || "";
          }
          confirmOk.textContent = okText || "OK";
          confirmCancel.textContent = cancelText || "Cancel";

          const cleanup = () => {
            confirmOverlay.classList.remove("active");
            confirmOverlay.setAttribute("aria-hidden", "true");
            confirmOk.removeEventListener("click", onOk);
            confirmCancel.removeEventListener("click", onCancel);
            confirmOverlay.removeEventListener("click", onBackdrop);
            document.removeEventListener("keydown", onKeyDown);
          };

          const onOk = () => {
            cleanup();
            resolve(true);
          };

          const onCancel = () => {
            cleanup();
            resolve(false);
          };

          const onBackdrop = (event) => {
            if (event.target === confirmOverlay) {
              onCancel();
            }
          };

          const onKeyDown = (event) => {
            if (event.key === "Escape") {
              onCancel();
            }
          };

          confirmOk.addEventListener("click", onOk);
          confirmCancel.addEventListener("click", onCancel);
          confirmOverlay.addEventListener("click", onBackdrop);
          document.addEventListener("keydown", onKeyDown);

          confirmOverlay.classList.add("active");
          confirmOverlay.setAttribute("aria-hidden", "false");
        });
      }

      function schedulePlanningRefresh() {
        if (!tenantFeatures.emploi_du_temps) {
          return;

        if (!isAuthenticated) {
          return;
        }
        if (planningRefreshScheduled) {
          return;

        planningRefreshScheduled = true;

        const run = async () => {
          planningRefreshScheduled = false;
          try {
            await runPlanningRefreshWithIndicator();
          } catch (error) {
            // ignore
          }
        };

        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(() => run(), { timeout: 1200 });
        } else {
          setTimeout(() => run(), 0);
        }
      }

      async function runPlanningRefreshWithIndicator() {
        if (planningRefreshInFlight) {
          return;
        }

        const canSpin = Boolean(planningRefreshButton);
        planningRefreshInFlight = true;

        if (canSpin) {
          planningRefreshButton.classList.add("is-loading");
          planningRefreshButton.disabled = true;
          planningRefreshButton.setAttribute("aria-busy", "true");
        }

        try {
          await refreshPlanning();
        } finally {
          planningRefreshInFlight = false;
          if (canSpin) {
            planningRefreshButton.classList.remove("is-loading");
            planningRefreshButton.removeAttribute("aria-busy");
            planningRefreshButton.disabled = !tenantFeatures.emploi_du_temps || !isAuthenticated;

      async function fetchWithAuth(url, options = {}) {
        const headers = { ...(options.headers || {}) };
        const token = getAuthToken();
        if (token) {
          headers.Authorization = `Bearer ${token}`;
        }
        if (selectedTenantId) {
          headers["X-Tenant-Id"] = selectedTenantId;
        }

        const response = await fetch(url, { ...options, headers });
        if (response.status === 401) {
          handleAuthError("Session expired.");
        }
        return response;
      }

      async function authenticate(identifier, password) {
        const submitButton = loginForm.querySelector("button[type=\"submit\"]");
        if (submitButton) {
          submitButton.disabled = true;
        }

        try {
          const response = await fetch(LOGIN_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ identifier, password }),
          });

          if (!response.ok) {
            handleAuthError("Sign-in error.");
            return;
          }

          const data = await response.json();
          if (!data?.token) {
            handleAuthError("Sign-in error.");
            return;
          }

          setAuthToken(data.token);
          isAuthenticated = true;
          setAdminMode(data?.tenant?.role);
          setTenantFeatures(data?.tenant?.features);
          selectedTenantId = getSelectedTenantId();
          if (isAdmin) {
            setLocked(false);
            await loadTenantOptions();
            if (selectedTenantId) {
              await loadTenantConfig();
            } else {
              categories = [];
              renderCategories();
              showView("category");
              schedulePlanningRefresh();
            }
          } else {
            categories = Array.isArray(data?.tenant?.folders) ? data.tenant.folders : [];
            setLocked(false);
            renderCategories();
            showView("category");
            schedulePlanningRefresh();
          }
          loginIdentifier.value = "";
        } catch (error) {
          handleAuthError("Sign-in error.");
        } finally {
          if (submitButton) {
            submitButton.disabled = false;
          }
        }
      }

      const pad2 = (value) => String(value).padStart(2, "0");

      function toISODateLocal(date) {
        return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
      }

      function fromISODateLocal(isoDate) {
        const text = String(isoDate || "").trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) {
          return null;
        }
        const [y, m, d] = text.split("-").map((x) => Number(x));
        if (!Number.isFinite(y) || !Number.isFinite(m) || !Number.isFinite(d)) {
          return null;
        }
        return new Date(y, m - 1, d);
      }

      function startOfWeekMonday(date) {
        const value = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        const dayIndex = (value.getDay() + 6) % 7; // Monday=0
        value.setDate(value.getDate() - dayIndex);
        return value;
      }

      function addDays(date, days) {
        const value = new Date(date.getFullYear(), date.getMonth(), date.getDate());
        value.setDate(value.getDate() + Number(days || 0));
        return value;
      }

      function addMonths(date, months) {
        const value = new Date(date.getFullYear(), date.getMonth(), 1);
        value.setMonth(value.getMonth() + Number(months || 0));
        return value;
      }

      function sameDay(left, right) {
        return (
          left &&
          right &&
          left.getFullYear() === right.getFullYear() &&
          left.getMonth() === right.getMonth() &&
          left.getDate() === right.getDate()
        );
      }

      function parseHeureToMinutes(value) {
        const text = String(value || "").trim().toLowerCase();
        if (!text) {
          return null;
        }

        let match = text.match(/^(\d{1,2})\s*(?:h|:)\s*(\d{2})(?::\d{2})?$/);
        if (!match) {
          match = text.match(/^(\d{1,2})(\d{2})$/); // ex: 1030
        }
        if (!match) {
          match = text.match(/^(\d{1,2})\s*h\s*$/); // ex: 10h
        }
        if (!match) {
          return null;
        }

        const hours = Number(match[1]);
        const minutes = match[2] ? Number(match[2]) : 0;
        if (!Number.isFinite(hours) || !Number.isFinite(minutes)) {
          return null;
        }
        if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) {
          return null;
        }
        return hours * 60 + minutes;
      }

      function formatMinutes(minutes) {
        const total = Number(minutes);
        const hours = Math.floor(total / 60);
        const mins = total % 60;
        return `${pad2(hours)}:${pad2(mins)}`;
      }

      function formatHeureLabel(value) {
        const minutes = parseHeureToMinutes(value);
        if (minutes === null) {
          return String(value || "").trim();
        }
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        return `${pad2(hours)}h${pad2(mins)}`;
      }

      function formatRangeLabelWeek(start) {
        const end = addDays(start, 6);
        const fmt = new Intl.DateTimeFormat("en-GB", { day: "2-digit", month: "2-digit" });
        return `${fmt.format(start)} → ${fmt.format(end)}`;
      }

      function formatRangeLabelMonth(date) {
        const fmt = new Intl.DateTimeFormat("en-GB", { month: "long", year: "numeric" });
        return fmt.format(new Date(date.getFullYear(), date.getMonth(), 1));
      }

      function buildByDate(items) {
        const byDate = new Map();
        (Array.isArray(items) ? items : []).forEach((item) => {
          const dateKey = String(item?.date || "").trim();
          if (!dateKey) {
            return;
          }
          if (!byDate.has(dateKey)) {
            byDate.set(dateKey, []);
          }
          byDate.get(dateKey).push(item);
        });
        byDate.forEach((list) => {
          list.sort((a, b) => {
            const am = parseHeureToMinutes(a?.heure);
            const bm = parseHeureToMinutes(b?.heure);
            if (am === null && bm === null) return 0;
            if (am === null) return 1;
            if (bm === null) return -1;
            return am - bm;
          });
        });
        return byDate;
      }

      async function loadRendezVousForRange(startISO, endISO) {
        if (!planningGrid || !planningSlots) {
          return;
        }

        if (planningHelperMessage) {
          planningHelperMessage.textContent = "Loading schedule…";
        }
        planningGrid.setAttribute("aria-busy", "true");

        try {
          const params = new URLSearchParams();
          if (startISO) params.set("start", startISO);
          if (endISO) params.set("end", endISO);
          const url = params.toString()
            ? `${RENDEZVOUS_ENDPOINT}?${params.toString()}`
            : RENDEZVOUS_ENDPOINT;
          const response = await fetchWithAuth(url);
          if (!response.ok) {
            if (planningHelperMessage) {
              planningHelperMessage.textContent = "Could not load the schedule.";
            }
            planningGrid.setAttribute("aria-busy", "false");
            return;
          }
          const data = await response.json();
          planningState.byDate = buildByDate(Array.isArray(data?.items) ? data.items : []);
          if (planningHelperMessage) {
            planningHelperMessage.textContent = "";
          }
        } catch (error) {
          if (planningHelperMessage) {
            planningHelperMessage.textContent = "Could not load the schedule.";
          }
        } finally {
          planningGrid.setAttribute("aria-busy", "false");
        }
      }

      async function loadOpenDaysForRange(startISO, endISO) {
        if (!planningGrid) {
          return;
        }
        // Do not refresh server state while the user is editing/painting,
        // otherwise async responses can overwrite the local selection.
        if (planningState.editMode) {
          return;
        }
        try {
          const params = new URLSearchParams();
          if (startISO) params.set("start", startISO);
          if (endISO) params.set("end", endISO);
          const url = params.toString()
            ? `${WORKING_DAYS_ENDPOINT}?${params.toString()}`
            : WORKING_DAYS_ENDPOINT;
          const response = await fetchWithAuth(url);
          if (!response.ok) {
            return;
          }
          const data = await response.json();
          const days = Array.isArray(data?.open_days) ? data.open_days : null;
          const dates = Array.isArray(data?.open_dates) ? data.open_dates : [];
          const todayIso = toISODateLocal(new Date());

          const nextOpenDays = new Set();
          const nextDayHours = new Map();

          if (Array.isArray(days) && days.length) {
            days.forEach((row) => {
              const date = String(row?.date || "").trim();
              if (!date || date < todayIso) {
                return;
              }
              nextOpenDays.add(date);
              const start_time = String(row?.start_time || "08:00").slice(0, 5) || "08:00";
              const end_time = String(row?.end_time || "18:00").slice(0, 5) || "18:00";
              nextDayHours.set(date, { start: start_time, end: end_time });
            });
          } else {
            dates
              .map((d) => String(d || "").trim())
              .filter(Boolean)
              .filter((d) => d >= todayIso)
              .forEach((d) => {
                nextOpenDays.add(d);
                nextDayHours.set(d, { start: "08:00", end: "18:00" });
              });
          }

          planningState.openDays = nextOpenDays;
          planningState.dayHours = nextDayHours;
          if (!planningState.editMode) {
            planningState.baseOpenDays = new Set(planningState.openDays);
            planningState.pendingDayChanges = new Map();
          }
        } catch (error) {
          // ignore
        }
      }

      function recordWorkingDayChange(dateISO, open) {
        const iso = String(dateISO || "").trim();
        if (!iso) {
          return;
        }

        const todayIso = toISODateLocal(new Date());
        if (iso < todayIso) {
          return;
        }

        const nextOpen = Boolean(open);
        const baseOpen = planningState.baseOpenDays.has(iso);
        if (nextOpen === baseOpen) {
          planningState.pendingDayChanges.delete(iso);
        } else {
          planningState.pendingDayChanges.set(iso, nextOpen);
        }
        updatePlanningEditToggleUI();
      }

      async function savePendingWorkingDayChanges() {
        const changes = Array.from(planningState.pendingDayChanges.entries()).map(
          ([date, isOpen]) => ({ date, open: isOpen })
        );
        if (!changes.length) {
          return true;
        }

        try {
          if (planningHelperMessage) {
            planningHelperMessage.textContent = "Saving days…";
          }
          const response = await fetchWithAuth(WORKING_DAYS_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ changes }),
          });
          if (!response.ok) {
            if (planningHelperMessage) {
              planningHelperMessage.textContent = "Could not save days.";
            }
            return false;
          }

          planningState.baseOpenDays = new Set(planningState.openDays);
          planningState.pendingDayChanges = new Map();
          updatePlanningEditToggleUI();
          if (planningHelperMessage) {
            planningHelperMessage.textContent = "Days saved.";
          }
          return true;
        } catch (error) {
          if (planningHelperMessage) {
            planningHelperMessage.textContent = "Could not save days.";
          }
          return false;
        }
      }

      function toggleWorkingDay(date) {
        const iso = toISODateLocal(date);
        const todayIso = toISODateLocal(new Date());
        if (iso < todayIso) {
          return;
        }
        const isOpen = planningState.openDays.has(iso);
        const next = !isOpen;
        if (next) {
          planningState.openDays.add(iso);
          if (!planningState.dayHours.has(iso)) {
            planningState.dayHours.set(iso, { start: "08:00", end: "18:00" });
          }
        } else {
          planningState.openDays.delete(iso);
          planningState.dayHours.delete(iso);
        }
        recordWorkingDayChange(iso, next);
      }

      function setWorkingDayByIso(iso, open) {
        const dateIso = String(iso || "").trim();
        if (!dateIso) {
          return;
        }
        const todayIso = toISODateLocal(new Date());
        if (dateIso < todayIso) {
          return;
        }
        const next = Boolean(open);
        const isOpen = planningState.openDays.has(dateIso);
        if (next === isOpen) {
          return;
        }
        if (next) {
          planningState.openDays.add(dateIso);
          if (!planningState.dayHours.has(dateIso)) {
            planningState.dayHours.set(dateIso, { start: "08:00", end: "18:00" });
          }
        } else {
          planningState.openDays.delete(dateIso);
          planningState.dayHours.delete(dateIso);
        }
        recordWorkingDayChange(dateIso, next);
      }

      function applyPaintAtPoint(clientX, clientY) {
        if (!planningState.paint.active) {
          return;

        const el = document.elementFromPoint(clientX, clientY);
        const target = el?.closest ? el.closest(".planning-month-day") : null;
        if (!target) {

        const todayIso = toISODateLocal(new Date());
        const dateIso = String(target.dataset.iso || "").trim();

      function renderDaySlots(date) {
        if (!planningSlots) {
          return;
        }
        const iso = toISODateLocal(date);
        const items = planningState.byDate.get(iso) || [];

        const hours = planningState.dayHours.get(iso) || { start: "08:00", end: "18:00" };
        if (planningHoursStart) {
          planningHoursStart.value = hours.start || "08:00";
        }
        if (planningHoursEnd) {
          planningHoursEnd.value = hours.end || "18:00";
        }

        const itemsByMinute = new Map();
        items.forEach((item) => {
          const minute = parseHeureToMinutes(item?.heure);
          if (minute === null) {
            return;
          }
          if (!itemsByMinute.has(minute)) {
            itemsByMinute.set(minute, []);
          }
          itemsByMinute.get(minute).push(item);
        });

        const titleFmt = new Intl.DateTimeFormat("en-GB", {
          weekday: "long",
          day: "2-digit",
          month: "2-digit",
          year: "numeric",
        });

        planningSlots.innerHTML = "";

        const title = document.createElement("div");
        title.className = "section-title";
        title.textContent = titleFmt.format(date);
        planningSlots.appendChild(title);

        const startMinutes = parseHeureToMinutes(hours.start) ?? 8 * 60;
        const endMinutes = parseHeureToMinutes(hours.end) ?? 18 * 60;
        for (let minute = startMinutes; minute <= endMinutes; minute += 30) {
          const row = document.createElement("div");
          row.className = "slot-row";

          const time = document.createElement("div");
          time.className = "slot-time";
          time.textContent = formatMinutes(minute);
          row.appendChild(time);

          const itemsCell = document.createElement("div");
          itemsCell.className = "slot-items";

          const slotItems = itemsByMinute.get(minute) || [];
          if (slotItems.length) {
            slotItems.forEach((rv) => {
              const card = document.createElement("div");
              card.className = "slot-item";
              const heure = rv?.heure ? formatHeureLabel(rv.heure) : formatHeureLabel(formatMinutes(minute));
              const prenom = String(rv?.client_prenom || "").trim();
              const snapchat = String(rv?.client_snapchat || "").trim();

              const top = document.createElement("div");
              top.className = "slot-item-top";

              const title = document.createElement("div");
              title.textContent = prenom ? `${heure} • ${prenom}` : `Appointment • ${heure}`;
              top.appendChild(title);

              const deleteBtn = document.createElement("button");
              deleteBtn.type = "button";
              deleteBtn.className = "slot-delete-btn";
              deleteBtn.textContent = "Delete";
              deleteBtn.addEventListener("click", async () => {
                const ok = await showConfirmDialog({
                  title: "Delete appointment?",
                  message: "Do you really want to delete this appointment?",
                  okText: "Yes, delete",
                  cancelText: "Cancel",
                });
                if (!ok) {
                  return;
                }

                if (planningHelperMessage) {
                  planningHelperMessage.textContent = "Deleting…";
                }

                try {
                  const response = await fetchWithAuth(DELETE_RENDEZVOUS_ENDPOINT, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                      date: iso,
                      heure: rv?.heure || formatMinutes(minute),
                      user_id: rv?.user_id,
                    }),
                  });

                  if (!response.ok) {
                    if (planningHelperMessage) {
                      planningHelperMessage.textContent = "Could not delete the appointment.";
                    }
                    return;
                  }

                  // Remove locally and refresh.
                  const list = planningState.byDate.get(iso) || [];
                  const next = list.filter(
                    (item) =>
                      !(String(item?.user_id || "") === String(rv?.user_id || "") &&
                        String(item?.heure || "").slice(0, 5) === String(rv?.heure || "").slice(0, 5))
                  );
                  planningState.byDate.set(iso, next);

                  if (planningHelperMessage) {
                    planningHelperMessage.textContent = "Appointment deleted.";
                  }
                  await refreshPlanning();
                } catch (error) {
                  if (planningHelperMessage) {
                    planningHelperMessage.textContent = "Could not delete the appointment.";
                  }
                }
              });
              top.appendChild(deleteBtn);

              card.appendChild(top);

              const meta = document.createElement("span");
              meta.className = "meta";
              meta.textContent = snapchat ? `Snapchat: ${snapchat}` : "";
              if (meta.textContent) {
                card.appendChild(meta);
              }
              itemsCell.appendChild(card);
            });
          } else {
            const empty = document.createElement("div");
            empty.className = "slot-empty";
            itemsCell.appendChild(empty);
          }

          row.appendChild(itemsCell);
          planningSlots.appendChild(row);
        }

        try {
          planningSlots.scrollTop = 0;
        } catch (error) {
          // ignore
        }
      }

      function renderWeek() {
        if (!planningGrid) {
          return;
        }

        const start = startOfWeekMonday(planningState.focusDate);
        if (planningRange) {
          planningRange.textContent = formatRangeLabelWeek(start);
        }

        planningGrid.className = "planning-week";
        planningGrid.innerHTML = "";

        const weekdayFmt = new Intl.DateTimeFormat("en-GB", { weekday: "short" });
        const dayFmt = new Intl.DateTimeFormat("en-GB", { day: "2-digit", month: "2-digit" });

        for (let i = 0; i < 7; i++) {
          const day = addDays(start, i);
          const iso = toISODateLocal(day);
          const count = (planningState.byDate.get(iso) || []).length;

          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "planning-day-btn";
          btn.classList.toggle("active", sameDay(day, planningState.selectedDate));

          const name = document.createElement("strong");
          name.textContent = weekdayFmt.format(day);
          const label = document.createElement("span");
          label.textContent = `${dayFmt.format(day)}${count ? ` • ${count}` : ""}`;
          btn.appendChild(name);
          btn.appendChild(label);

          btn.addEventListener("click", () => {
            planningState.selectedDate = day;
            renderPlanning();
          });

          planningGrid.appendChild(btn);
        }

        renderDaySlots(planningState.selectedDate);
      }

      function renderMonth() {
        if (!planningGrid) {
          return;
        }

        const todayIso = toISODateLocal(new Date());

        const monthStart = new Date(planningState.focusDate.getFullYear(), planningState.focusDate.getMonth(), 1);
        if (planningRange) {
          planningRange.textContent = formatRangeLabelMonth(monthStart);
        }

        planningGrid.className = "planning-month";
        planningGrid.innerHTML = "";

        const weekdays = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        weekdays.forEach((w) => {
          const cell = document.createElement("div");
          cell.className = "weekday";
          cell.textContent = w;
          planningGrid.appendChild(cell);
        });

        const firstGridDay = startOfWeekMonday(monthStart);
        const afterMonth = addMonths(monthStart, 1);
        const lastOfMonth = new Date(afterMonth.getFullYear(), afterMonth.getMonth(), 0);
        const gridEnd = addDays(startOfWeekMonday(lastOfMonth), 6);

        for (
          let cursor = new Date(firstGridDay.getFullYear(), firstGridDay.getMonth(), firstGridDay.getDate());
          cursor <= gridEnd;
          cursor = addDays(cursor, 1)
        ) {
          const dayDate = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate());
          const isCurrentMonth = dayDate.getMonth() === monthStart.getMonth();
          const iso = toISODateLocal(dayDate);
          const count = (planningState.byDate.get(iso) || []).length;
          const isPast = iso < todayIso;

          const day = document.createElement("button");
          day.type = "button";
          day.className = "planning-month-day";
          day.dataset.iso = iso;
          if (!isCurrentMonth) {
            day.classList.add("muted");
          }
          day.classList.toggle("active", sameDay(dayDate, planningState.selectedDate));
          day.classList.toggle("open", planningState.openDays.has(iso));
          day.classList.toggle("editing", planningState.editMode);
          day.classList.toggle("muted", isPast || !isCurrentMonth);
          day.textContent = String(dayDate.getDate());
          day.title = count ? `${count} appointments` : "";

          const clearPaintPress = () => {
            if (planningState.paint.pressTimer) {
              clearTimeout(planningState.paint.pressTimer);
              planningState.paint.pressTimer = null;
            }
          };

          const stopPaint = () => {
            clearPaintPress();
            planningState.paint.active = false;
            planningState.paint.visited = new Set();
            planningState.paint.pointerId = null;
            document.body.classList.remove("planning-painting");
          };

          const applyPaintToElement = (el) => {
            const target = el?.closest ? el.closest(".planning-month-day") : null;
            if (!target) {
              return;
            }
            const dateIso = String(target.dataset.iso || "").trim();
            if (!dateIso) {
              return;
            }
            if (dateIso < todayIso) {
              return;
            }
            if (planningState.paint.visited.has(dateIso)) {
              return;
            }
            planningState.paint.visited.add(dateIso);
            setWorkingDayByIso(dateIso, planningState.paint.targetOpen);
            target.classList.toggle("open", planningState.paint.targetOpen);
          };

          const startPaint = () => {
            if (!planningState.editMode) {
              return;
            }

            if (iso < todayIso) {
              return;
            }

            planningState.paint.didLongPress = true;
            planningState.paint.active = true;
            planningState.paint.visited = new Set();
            document.body.classList.add("planning-painting");

            const isOpenNow = planningState.openDays.has(iso);
            planningState.paint.targetOpen = !isOpenNow;

            if (planningHelperMessage) {
              planningHelperMessage.textContent = planningState.paint.targetOpen
                ? "Drag to open multiple days."
                : "Drag to close multiple days.";
            }

            applyPaintToElement(day);
          };

          day.addEventListener("pointerdown", (event) => {
            // Pointer Events unify touch + mouse.
            if (!planningState.editMode) {
              return;
            }
            planningState.paint.didLongPress = false;
            planningState.paint.pointerId = event.pointerId;
            clearPaintPress();
            planningState.paint.pressTimer = setTimeout(startPaint, 320);

            try {
              day.setPointerCapture(event.pointerId);
            } catch (error) {
              // ignore
            }

            // Avoid page scroll while trying to select days.
            if (event.pointerType === "touch") {
              try {
                event.preventDefault();
              } catch (error) {
                // ignore
              }
            }
          });

          day.addEventListener("pointermove", (event) => {
            if (!planningState.paint.active) {
              return;
            }
            if (
              planningState.paint.pointerId !== null &&
              event.pointerId !== planningState.paint.pointerId
            ) {
              return;
            }
            const el = document.elementFromPoint(event.clientX, event.clientY);
            applyPaintToElement(el);
            if (event.pointerType === "touch") {
              try {
                event.preventDefault();
              } catch (error) {
                // ignore
              }
            }
          });

          day.addEventListener("pointerup", () => {
            clearPaintPress();
            if (planningState.paint.active) {
              stopPaint();
              if (planningHelperMessage) {
                planningHelperMessage.textContent = planningState.editMode
                  ? "Edit mode: tap/long-press to open/close."
                  : "";
              }
            }
          });

          day.addEventListener("pointercancel", () => {
            stopPaint();
          });

          day.addEventListener("pointerleave", () => {
            // If the user moved away before the long-press triggers, cancel the timer.
            if (!planningState.paint.active) {
              clearPaintPress();
            }
          });

          day.addEventListener("click", () => {
            if (planningState.paint.didLongPress) {
              // Prevent a click from toggling again after a long-press paint.
              planningState.paint.didLongPress = false;
              return;
            }
            planningState.selectedDate = dayDate;
            planningState.focusDate = new Date(dayDate.getFullYear(), dayDate.getMonth(), 1);
            if (planningState.editMode) {
              if (!isPast) {
                toggleWorkingDay(dayDate);
              }
            }
            renderPlanning();
          });

          planningGrid.appendChild(day);
        }

        renderDaySlots(planningState.selectedDate);
      }

      async function refreshPlanning() {
        if (!planningView || !isAuthenticated) {
          return;
        }

        if (!tenantFeatures.emploi_du_temps) {
          return;
        }

        if (isAdmin && !selectedTenantId) {
          planningState.byDate = new Map();
          if (planningHelperMessage) {
            planningHelperMessage.textContent = "Choose a client to view the schedule.";
          }
          renderPlanning();
          return;
        }

        planningModeMonth?.classList.toggle("active", planningState.mode === "month");

        updatePlanningEditToggleUI();

        const monthStart = new Date(planningState.focusDate.getFullYear(), planningState.focusDate.getMonth(), 1);
        const afterMonth = addMonths(monthStart, 1);
        const monthEnd = new Date(afterMonth.getFullYear(), afterMonth.getMonth(), 0);
        await Promise.all([
          loadRendezVousForRange(toISODateLocal(monthStart), toISODateLocal(monthEnd)),
          loadOpenDaysForRange(toISODateLocal(monthStart), toISODateLocal(monthEnd)),
        ]);

        renderPlanning();
      }

      function renderPlanning() {
        if (!planningView) {
          return;
        }
        planningModeMonth?.classList.toggle("active", planningState.mode === "month");
        renderMonth();
      }

      if (planningModeMonth && planningPrev && planningNext) {
        planningModeMonth.addEventListener("click", async () => {
          planningState.mode = "month";
          await refreshPlanning();
        });

        planningPrev.addEventListener("click", async () => {
          planningState.focusDate = addMonths(planningState.focusDate, -1);
          planningState.selectedDate = new Date(
            planningState.focusDate.getFullYear(),
            planningState.focusDate.getMonth(),
            1
          );
          await refreshPlanning();
        });

        planningNext.addEventListener("click", async () => {
          planningState.focusDate = addMonths(planningState.focusDate, 1);
          planningState.selectedDate = new Date(
            planningState.focusDate.getFullYear(),
            planningState.focusDate.getMonth(),
            1
          );
          await refreshPlanning();
        });
      }

      if (planningRefreshButton) {
        planningRefreshButton.addEventListener("click", async () => {
          await runPlanningRefreshWithIndicator();
        });
      }

      async function applyHoursToSelectedDay() {
        if (!tenantFeatures.emploi_du_temps) {
          return;
        }
        if (!planningHoursStart || !planningHoursEnd) {
          return;
        }

        const dateIso = toISODateLocal(planningState.selectedDate);
        const start = String(planningHoursStart.value || "").trim() || "08:00";
        const end = String(planningHoursEnd.value || "").trim() || "18:00";

        planningState.openDays.add(dateIso);
        planningState.dayHours.set(dateIso, { start, end });

        if (planningHelperMessage) {
          planningHelperMessage.textContent = "Saving hours…";
        }

        try {
          const changes = [{ date: dateIso, open: true, start_time: start, end_time: end }];
          const response = await fetchWithAuth(WORKING_DAYS_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ changes }),
          });

          if (!response.ok) {
            if (planningHelperMessage) {
              planningHelperMessage.textContent = "Could not save hours.";
            }
            return;
          }

          if (planningHelperMessage) {
            planningHelperMessage.textContent = "Hours saved.";
          }
          await refreshPlanning();
        } catch (error) {
          if (planningHelperMessage) {
            planningHelperMessage.textContent = "Could not save hours.";
          }
        }
      }

      if (planningApplyHours) {
        planningApplyHours.addEventListener("click", applyHoursToSelectedDay);

          if (!planningState.editMode) {

            if (planningHelperMessage) {

          }
          updatePlanningEditToggleUI();
          renderPlanning();
        });

      function findFolderInCategories(folderKey) {
        const key = String(folderKey || "").trim();
        if (!key) {
          return null;
        }
        for (const category of categories) {
          if (category?.folder === key) {
            return { label: category.label, folder: key };
          }
          const subs = Array.isArray(category?.subcategories) ? category.subcategories : [];
          for (const sub of subs) {
            if (sub?.folder === key) {
              return { label: `${category.label} / ${sub.label}`, folder: key };
            }
          }
        }
        return null;
      }
