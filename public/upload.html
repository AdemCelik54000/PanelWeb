      async function computeSha1(file) {
        const buffer = await file.arrayBuffer();
        const digest = await crypto.subtle.digest("SHA-1", buffer);
        const hashArray = Array.from(new Uint8Array(digest));
        return hashArray.map((byte) => byte.toString(16).padStart(2, "0")).join("");
      }

      async function checkDuplicate(hash) {
        try {
          const response = await fetchWithAuth(
            `${DUPLICATE_CHECK_ENDPOINT}?hash=${encodeURIComponent(hash)}`
          );
          if (!response.ok) {
            return false;
          }
          const data = await response.json();
          return Boolean(data?.exists);
        } catch (error) {
          return false;
        }
      }

      function parsePosition(rawPosition) {
        const value = Number(rawPosition);
        return Number.isFinite(value) ? value : null;
      }

      function buildVideoThumbnail(publicId) {
        if (!publicId) {
          return "";
        }
        return `https://res.cloudinary.com/${getCloudName()}/video/upload/so_0,f_jpg/${publicId}.jpg`;
      }

      function buildImagePreviewUrl(url) {
        if (!url) {
          return "";
        }
        const marker = "/image/upload/";
        const idx = url.indexOf(marker);
        if (idx === -1) {
          return url;
        }
        const transform = "f_auto,q_auto:eco,w_480,h_480,c_fill";
        return `${url.slice(0, idx + marker.length)}${transform}/${url.slice(
          idx + marker.length
        )}`;
      }

      function detectManualOrder(items) {
        // Some tenants may have older assets without the `position` context.
        // If at least one item has a numeric position, treat the folder as manually ordered.
        return items.length > 0 && items.some((item) => Number.isFinite(item.position));
      }

      function sortImages(items) {
        if (state.hasManualOrder) {
          return items
            .slice()
            .sort((a, b) => {
              const ap = Number.isFinite(a.position) ? a.position : Number.POSITIVE_INFINITY;
              const bp = Number.isFinite(b.position) ? b.position : Number.POSITIVE_INFINITY;
              if (ap !== bp) return ap - bp;
              return new Date(a.created_at).getTime() - new Date(b.created_at).getTime();
            });
        }
        return items
          .slice()
          .sort((a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime());
      }

      async function persistMissingPositionsIfNeeded(images) {
        const list = Array.isArray(images) ? images : [];
        const withPos = list.filter((img) => Number.isFinite(img.position));
        const missing = list.filter((img) => !Number.isFinite(img.position));
        if (!withPos.length || !missing.length) {
          return;
        }

        const maxPos = withPos.reduce((max, img) => (img.position > max ? img.position : max), 0);
        let nextPos = maxPos;
        const payload = missing.map((img) => {
          nextPos += 1;
          img.position = nextPos;
          return {
            public_id: img.public_id,
            position: nextPos,
            resource_type: img.kind === "video" ? "video" : "image",
          };
        });

        // Best-effort background persistence; don't block the UI.
        try {
          await saveOrderPayload(payload);
        } catch (error) {
          // ignore
        }
      }

      function updateOrderIndexes() {
        const items = Array.from(orderGrid.children);
        items.forEach((item, index) => {

      function renderOrderGrid() {
        orderGrid.innerHTML = "";
        if (!state.images.length) {
          orderEmpty.classList.remove("hidden");
          return;
        }

        orderEmpty.classList.add("hidden");
        state.images.forEach((image, index) => {
          const item = document.createElement("div");
          item.className = "order-item";
          if (state.selectedIds.has(image.public_id)) {
            item.classList.add("selected");
          }
          item.dataset.publicId = image.public_id;

          const img = document.createElement("img");
          img.addEventListener(
            "load",
            () => {
              img.classList.add("loaded");
            },
            { once: true }
          );
          img.addEventListener(
            "error",
            () => {
              img.classList.add("loaded");
            },
            { once: true }
          );
          img.decoding = "async";
          img.src =
            image.kind === "video"
              ? buildVideoThumbnail(image.public_id)
              : buildImagePreviewUrl(image.secure_url);
          img.alt = state.currentLabel || "Site photo";
          img.loading = "lazy";

          const badge = document.createElement("div");
          badge.className = "order-index";
          badge.textContent = `${index + 1}`;

          if (image.kind === "video") {
            const videoBadge = document.createElement("div");
            videoBadge.className = "order-video-badge";
            videoBadge.textContent = "▶";
            item.appendChild(videoBadge);
          }

          item.appendChild(img);
          item.appendChild(badge);
          orderGrid.appendChild(item);
        });
      }

      function getOrderedPublicIds() {
        return Array.from(orderGrid.children)
          .map((item) => item.dataset.publicId)
          .filter(Boolean);
      }

      function syncStateFromDom() {
        const orderedIds = getOrderedPublicIds();
        const lookup = new Map(state.images.map((image) => [image.public_id, image]));
        state.images = orderedIds.map((id) => lookup.get(id)).filter(Boolean);
        updateOrderIndexes();
      }

      function toggleSelectMode() {
        state.selectMode = !state.selectMode;
        if (!state.selectMode) {
          resetSelection();
        }
        updateSelectionModeUI();
        renderOrderGrid();
      }

      function toggleSelectedItem(publicId) {
        if (!publicId) {
          return;
        }
        if (state.selectedIds.has(publicId)) {
          state.selectedIds.delete(publicId);
        } else {
          state.selectedIds.add(publicId);
        }
        renderOrderGrid();
      }

      async function loadImagesForFolder() {
        if (!state.currentFolder) {
          return;
        }
        resetSelection();
        updateSelectionModeUI();
        const endpoint = `${LIST_IMAGES_ENDPOINT}?folder=${encodeURIComponent(
          state.currentFolder
        )}`;
        orderStatus.textContent = "Loading photos...";
        orderGrid.innerHTML = "";
        orderEmpty.classList.add("hidden");

        try {
          const response = await fetchWithAuth(endpoint);
          if (!response.ok) {
            const errorText = await response.text();
            console.error("Cloudinary list error", {
              folder: state.currentFolder,
              endpoint,
              status: response.status,
              statusText: response.statusText,
              body: errorText,
            });
            orderStatus.textContent =
              "Failed to load photos. Check your connection and Cloudinary configuration.";
            return;
          }

          const data = await response.json();
          const items = Array.isArray(data?.items) ? data.items : [];
          const normalized = items.map((item) => ({
            public_id: item.public_id,
            secure_url: item.secure_url,
            created_at: item.created_at,
            kind: item.resource_type === "video" ? "video" : "image",
            position: parsePosition(item.position),
          }));

          state.hasManualOrder = detectManualOrder(normalized);
          // If some items have positions but others don't, assign the missing ones to the end and persist.
          if (state.hasManualOrder) {
            await persistMissingPositionsIfNeeded(normalized);
          }
          state.images = sortImages(normalized);
          renderOrderGrid();
          orderStatus.textContent = "";
        } catch (error) {
          console.error("Cloudinary list error", {
            folder: state.currentFolder,
            endpoint,
            error,
          });
          orderStatus.textContent =
            "Failed to load photos. Check your connection and Cloudinary configuration.";
        }
      }

      async function saveOrderPayload(items) {
        if (!items.length) {
          return { ok: false, error: "missing_items" };
        }
        try {
          const response = await fetchWithAuth(SAVE_ORDER_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items }),
          });

          if (response.ok) {
            return { ok: true };
          }

          const bodyText = await response.text().catch(() => "");
          return {
            ok: false,
            status: response.status,
            statusText: response.statusText,
            body: bodyText,
          };
        } catch (error) {
          return { ok: false, error: String(error) };
        }
      }

      async function saveCurrentOrder() {
        if (!state.images.length) {
          orderStatus.textContent = "No photos to save.";
          return;
        }

        setGlobalLoading({
          title: "Saving…",
          subtitle: "Please do not close the app.",
          mode: "indeterminate",
        });

        orderStatus.textContent = "Saving order...";
        saveOrderButton.disabled = true;
        saveOrderButton.textContent = "SAVING...";

        const orderedIds = getOrderedPublicIds();
        const payload = orderedIds.map((id, index) => {
          const item = state.images.find((image) => image.public_id === id);
          return {
            public_id: id,
            position: index + 1,
            resource_type: item?.kind === "video" ? "video" : "image",
          };
        });

        let result = null;
        try {
          result = await saveOrderPayload(payload);
        } finally {
          clearGlobalLoading();
          saveOrderButton.disabled = false;
          saveOrderButton.textContent = "SAVE ORDER";
        }

        if (!result?.ok) {
          const details = [];
          if (result?.status) {
            details.push(`HTTP ${result.status}`);
          }
          if (result?.body) {
            details.push(result.body);
          }
          if (result?.error) {
            details.push(result.error);
          }
          orderStatus.textContent = details.length
            ? `Failed to save. ${details.join(" • ")}`
            : "Failed to save.";
          return;
        }

        state.images = state.images.map((image) => {
          const idx = orderedIds.indexOf(image.public_id);
          return { ...image, position: idx + 1 };
        });
        state.hasManualOrder = true;
        state.images = sortImages(state.images);
        renderOrderGrid();
        orderStatus.textContent = "Order saved.";

        showView("category");
      }

      async function assignPositionAfterUpload(uploadedAsset) {
        if (!uploadedAsset?.public_id) {
          return;
        }

        const existing = state.images.slice();
        const hasFullPositions = detectManualOrder(existing);
        if (!hasFullPositions) {
          const orderedIds = getOrderedPublicIds();
          const orderedImages = orderedIds
            .map((id) => existing.find((image) => image.public_id === id))
            .filter(Boolean);

          const baseImages = orderedImages.length
            ? orderedImages
            : existing.slice().sort((a, b) => {
                return new Date(a.created_at).getTime() - new Date(b.created_at).getTime();
              });

          const updatedImages = baseImages.concat({
            ...uploadedAsset,
            position: baseImages.length + 1,
          });
          const payload = updatedImages.map((image, index) => ({
            public_id: image.public_id,
            position: index + 1,
            resource_type: image.kind === "video" ? "video" : "image",
          }));
          const success = await saveOrderPayload(payload);
          if (success) {
            state.images = updatedImages.map((image, index) => ({
              ...image,
              position: index + 1,
            }));
            state.hasManualOrder = true;
            renderOrderGrid();
          }
          return;
        }

        const maxPosition = existing.reduce((max, image) => {
          return Number.isFinite(image.position) ? Math.max(max, image.position) : max;
        }, 0);
        const nextPosition = maxPosition + 1;
        const success = await saveOrderPayload([
          {
            public_id: uploadedAsset.public_id,
            position: nextPosition,
            resource_type: "image",
          },
        ]);
        if (success) {
          state.images = sortImages(
            existing.concat({ ...uploadedAsset, position: nextPosition })
          );
          renderOrderGrid();
        }
      }

      async function uploadFiles(files) {
        const maxFileSize = 120000000;
        let uploadedCount = 0;
        let skippedCount = 0;
        let duplicateCount = 0;
        let lastError = "";
        const seenHashes = new Set();

        const totalFiles = Array.isArray(files) ? files.length : files?.length || 0;
        const useDeterminate = totalFiles > 1;
        let processedCount = 0;

        setGlobalLoading({
          title: "Uploading photos…",
          subtitle: "Please do not close the app.",
          mode: useDeterminate ? "determinate" : "indeterminate",
          current: 0,
          total: useDeterminate ? totalFiles : 0,
        });

        try {
          const previewItems = buildPreviewItemsFromFiles(files);
          if (previewItems.length) {
            setGlobalLoadingPreviews({
              variant: "upload",
              items: previewItems,
              activeIndex: 0,
            });
          }
        } catch (error) {
          // ignore preview errors
        }

        uploadButton.disabled = true;
        uploadButton.textContent = "Uploading...";
        statusMessage.textContent = "Checking for duplicates...";

        try {
          for (const file of files) {
            processedCount += 1;
            if (useDeterminate) {
              updateGlobalLoadingProgress({ current: processedCount, total: totalFiles });
            }

            setGlobalLoadingActivePreview(processedCount - 1);

            if (file.size > maxFileSize) {
              skippedCount += 1;
              continue;
            }

          let hash = "";
          try {
            hash = await computeSha1(file);
          } catch (error) {
            hash = "";
          }

          if (hash) {
            if (seenHashes.has(hash)) {
              duplicateCount += 1;
              continue;
            }
            seenHashes.add(hash);
          }

          if (hash) {
            const exists = await checkDuplicate(hash);
            if (exists) {
              duplicateCount += 1;
              continue;
            }
          }

          const signaturePayload = await getUploadSignature({
            folder: state.currentFolder,
            hash,
          });
          if (!signaturePayload?.signature || !signaturePayload?.timestamp) {
            skippedCount += 1;
            lastError = "Invalid upload signature";
            continue;
          }

          const uploadFolder = signaturePayload.folder || state.currentFolder;
          const uploadTags = signaturePayload.tags || "";
          const uploadPreset = signaturePayload.upload_preset || getUploadPreset();
          const cloudName = signaturePayload.cloud_name || getCloudName();
          const formData = new FormData();
          formData.append("file", file);
          formData.append("folder", uploadFolder);
          formData.append("upload_preset", uploadPreset);
          formData.append("timestamp", signaturePayload.timestamp);
          formData.append("signature", signaturePayload.signature);
          formData.append("api_key", signaturePayload.api_key);
          if (uploadTags) {
            formData.append("tags", uploadTags);
          }

          try {
            const response = await fetch(
              `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
              { method: "POST", body: formData }
            );

            if (!response.ok) {
              try {
                const data = await response.json();
                lastError = data?.error?.message || "Upload error";
              } catch (parseError) {
                lastError = "Upload error";
              }
              skippedCount += 1;
              continue;
            }

            let uploadedAsset = null;
            try {
              const data = await response.json();
              uploadedAsset = {
                public_id: data?.public_id,
                secure_url: data?.secure_url || data?.url,
                created_at: data?.created_at,
              };
            } catch (parseError) {
              uploadedAsset = null;
            }

            uploadedCount += 1;

            if (uploadedAsset?.public_id) {
              await assignPositionAfterUpload(uploadedAsset);
            }
          } catch (error) {
            skippedCount += 1;
          }
        }
        } finally {
          clearGlobalLoading();
        }

        uploadButton.disabled = false;
        uploadButton.textContent = "Add photos";

        if (uploadedCount > 0) {
          statusMessage.textContent = `${uploadedCount} photo(s) uploaded successfully.`;
          if (duplicateCount > 0) {
            statusMessage.textContent += ` ${duplicateCount} duplicate(s) detected.`;
          }
          if (skippedCount > 0) {
            statusMessage.textContent += ` ${skippedCount} file(s) skipped.`;
          }
          showView("category");
        } else if (skippedCount > 0) {
          const detail = lastError ? ` (${lastError})` : "";
          statusMessage.textContent = `No photos uploaded. Files may be too large or there were errors.${detail}`;
        } else if (duplicateCount > 0) {
          statusMessage.textContent = "No photos uploaded. Duplicates detected.";
        } else {
          statusMessage.textContent = "";
        }
      }

      const dragState = {
        pointerId: null,
        longPressTimer: null,
        draggingEl: null,
        placeholderEl: null,
        ghostEl: null,
        startX: 0,
        startY: 0,
        lastX: 0,
        lastY: 0,
        autoScrollVelocity: 0,
        scrollRaf: null,
        active: false,
      };

      function handleGlobalTouchMove(event) {
        if (!dragState.active) {
          return;
        }
        event.preventDefault();
      }

      function clearDragState() {
        if (dragState.longPressTimer) {
          clearTimeout(dragState.longPressTimer);
        }
        dragState.longPressTimer = null;
        dragState.pointerId = null;
        dragState.active = false;
        dragState.autoScrollVelocity = 0;
        if (dragState.scrollRaf) {
          cancelAnimationFrame(dragState.scrollRaf);
        }
        dragState.scrollRaf = null;
        if (dragState.draggingEl) {
          dragState.draggingEl.classList.remove("dragging");
        }
        dragState.draggingEl = null;
        if (dragState.placeholderEl) {
          dragState.placeholderEl.remove();
        }
        dragState.placeholderEl = null;
        if (dragState.ghostEl) {
          dragState.ghostEl.remove();
        }
        dragState.ghostEl = null;
        document.body.style.userSelect = "";
        document.body.style.webkitUserSelect = "";
        document.body.style.overflow = "";
        document.body.style.touchAction = "";
      }

      function createGhost(target) {
        const rect = target.getBoundingClientRect();
        const ghost = target.cloneNode(true);
        ghost.classList.add("drag-ghost");
        ghost.style.width = `${rect.width}px`;
        ghost.style.height = `${rect.height}px`;
        document.body.appendChild(ghost);
        dragState.ghostEl = ghost;
      }

      function moveGhost(x, y) {
        if (!dragState.ghostEl) {
          return;
        }
        dragState.ghostEl.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
      }

      function updateAutoScroll(pointerY) {
        const edgeSize = 90;
        const maxSpeed = 10;
        let velocity = 0;

        if (pointerY < edgeSize) {
          const intensity = (edgeSize - pointerY) / edgeSize;
          velocity = -Math.max(1, intensity * maxSpeed);
        } else if (pointerY > window.innerHeight - edgeSize) {
          const intensity = (pointerY - (window.innerHeight - edgeSize)) / edgeSize;
          velocity = Math.max(1, intensity * maxSpeed);
        }

        dragState.autoScrollVelocity = velocity;

        if (!dragState.scrollRaf && velocity !== 0) {
          const step = () => {
            if (!dragState.active || dragState.autoScrollVelocity === 0) {
              dragState.scrollRaf = null;
              return;
            }
            window.scrollBy(0, dragState.autoScrollVelocity);
            moveGhost(dragState.lastX, dragState.lastY);
            dragState.scrollRaf = requestAnimationFrame(step);
          };
          dragState.scrollRaf = requestAnimationFrame(step);
        }
      }

      async function deleteSelectedAssets() {
        if (state.selectedIds.size === 0) {
          orderStatus.textContent = "No selection.";
          return;
        }
        const items = state.images
          .filter((image) => state.selectedIds.has(image.public_id))
          .map((image) => ({
            public_id: image.public_id,
            resource_type: image.kind === "video" ? "video" : "image",
          }));

        setGlobalLoading({
          title: "Deleting…",
          subtitle: "Please do not close the app.",
          mode: "indeterminate",
        });

        try {
          const previewItems = buildPreviewItemsFromSelected();
          if (previewItems.length) {
            setGlobalLoadingPreviews({
              variant: "delete",
              items: previewItems,
              activeIndex: -1,
            });
          }
        } catch (error) {
          // ignore preview errors
        }

        orderStatus.textContent = "Deleting...";
        deleteSelectedButton.disabled = true;
        downloadSelectedButton.disabled = true;

        let success = false;
        try {
          const response = await fetchWithAuth(DELETE_ASSETS_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ items }),
          });
          success = response.ok;
        } catch (error) {
          success = false;
        }

        clearGlobalLoading();
        deleteSelectedButton.disabled = false;
        downloadSelectedButton.disabled = false;

        if (!success) {
          orderStatus.textContent = "Failed to delete.";
          return;
        }

        orderStatus.textContent = "Delete complete.";
        state.selectMode = false;
        resetSelection();
        updateSelectionModeUI();
        showView("category");
      }

      function getFilenameFromUrl(url, publicId) {
        if (!url) {
          return publicId ? publicId.split("/").pop() : "media";
        }
        try {
          const parsed = new URL(url);
          const parts = parsed.pathname.split("/");
          return parts[parts.length - 1] || publicId?.split("/").pop() || "media";
        } catch (error) {
          return publicId ? publicId.split("/").pop() : "media";
        }
      }

      async function downloadSelectedAssets() {
        if (state.selectedIds.size === 0) {
          orderStatus.textContent = "No selection.";
          return;
        }
        const items = state.images.filter((image) => state.selectedIds.has(image.public_id));
        orderStatus.textContent = "Downloading...";
        deleteSelectedButton.disabled = true;
        downloadSelectedButton.disabled = true;

        for (const item of items) {
          const url = item.secure_url;
          if (!url) {
            continue;
          }
          try {
            const response = await fetch(url);
            if (!response.ok) {
              continue;
            }
            const blob = await response.blob();
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = getFilenameFromUrl(url, item.public_id);
            document.body.appendChild(link);
            link.click();
            link.remove();
            URL.revokeObjectURL(link.href);
          } catch (error) {
            continue;
          }
        }

        deleteSelectedButton.disabled = false;
        downloadSelectedButton.disabled = false;
        orderStatus.textContent = "Download complete.";
        state.selectMode = false;
        resetSelection();
        updateSelectionModeUI();
        renderOrderGrid();
      }

      function startDrag(target, x, y) {
        dragState.active = true;
        dragState.draggingEl = target;
        target.classList.add("dragging");
        dragState.placeholderEl = document.createElement("div");
        dragState.placeholderEl.className = "order-item order-placeholder";
        dragState.placeholderEl.style.width = `${target.offsetWidth}px`;
        dragState.placeholderEl.style.height = `${target.offsetHeight}px`;
        orderGrid.insertBefore(dragState.placeholderEl, target.nextSibling);
        createGhost(target);
        moveGhost(x, y);
        document.body.style.userSelect = "none";
        document.body.style.webkitUserSelect = "none";
        document.body.style.overflow = "hidden";
        document.body.style.touchAction = "none";
      }

      function handlePointerDown(event) {
        const target = event.target.closest(".order-item");
        if (!target) {
          return;
        }
        if (state.selectMode) {
          return;
        }

        dragState.pointerId = event.pointerId;
        dragState.startX = event.clientX;
        dragState.startY = event.clientY;
        dragState.lastX = event.clientX;
        dragState.lastY = event.clientY;
        dragState.longPressTimer = setTimeout(
          () => startDrag(target, event.clientX, event.clientY),
          320
        );
      }

      function handlePointerMove(event) {
        if (dragState.pointerId !== event.pointerId) {
          return;
        }
        if (state.selectMode) {
          return;
        }

        if (!dragState.active) {
          const deltaX = event.clientX - dragState.startX;
          const deltaY = event.clientY - dragState.startY;
          if (Math.hypot(deltaX, deltaY) > 6 && dragState.longPressTimer) {
            clearTimeout(dragState.longPressTimer);
            dragState.longPressTimer = null;
          }
          return;
        }

        event.preventDefault();
        dragState.lastX = event.clientX;
        dragState.lastY = event.clientY;
        moveGhost(event.clientX, event.clientY);

        updateAutoScroll(event.clientY);

        const element = document.elementFromPoint(event.clientX, event.clientY);
        const overItem = element ? element.closest(".order-item") : null;
        if (
          !overItem ||
          overItem === dragState.draggingEl ||
          overItem === dragState.placeholderEl
        ) {
          return;
        }

        const items = Array.from(orderGrid.children);
        const draggingIndex = items.indexOf(dragState.placeholderEl);
        const overIndex = items.indexOf(overItem);
        if (draggingIndex === -1 || overIndex === -1) {
          return;
        }

        if (overIndex > draggingIndex) {
          orderGrid.insertBefore(dragState.placeholderEl, overItem.nextSibling);
        } else {
          orderGrid.insertBefore(dragState.placeholderEl, overItem);
        }
        updateOrderIndexes();
      }

      function handlePointerUp(event) {
        if (dragState.pointerId !== event.pointerId) {
          return;
        }
        if (state.selectMode) {
          clearDragState();
          return;
        }

        if (dragState.active) {
          if (dragState.placeholderEl && dragState.draggingEl) {
            orderGrid.insertBefore(dragState.draggingEl, dragState.placeholderEl);
          }
          syncStateFromDom();
        }
        clearDragState();
      }

      document.getElementById("backToCategories").addEventListener("click", () => {
        showView("category");
      });

      document.getElementById("backToSubcategories").addEventListener("click", () => {
        const hasSubcategories =
          state.currentCategory &&
          Array.isArray(state.currentCategory.subcategories) &&
          state.currentCategory.subcategories.length > 0;
        if (hasSubcategories) {
          showView("subcategory");
        } else {
          showView("category");
        }
      });

      if (adminTenantSelect) {
        adminTenantSelect.addEventListener("change", async (event) => {
          selectedTenantId = event.target.value;
          setSelectedTenantId(selectedTenantId);
          await loadTenantConfig();
        });
      }

      uploadButton.addEventListener("click", openUploadWidget);

      saveOrderButton.addEventListener("click", saveCurrentOrder);
      selectModeButton.addEventListener("click", toggleSelectMode);
      deleteSelectedButton.addEventListener("click", deleteSelectedAssets);
      downloadSelectedButton.addEventListener("click", downloadSelectedAssets);
      logoutButton.addEventListener("click", logout);

      orderGrid.addEventListener("pointerdown", handlePointerDown);
      orderGrid.addEventListener("pointermove", handlePointerMove);
      orderGrid.addEventListener("pointerup", handlePointerUp);
      orderGrid.addEventListener("pointercancel", handlePointerUp);
      orderGrid.addEventListener("contextmenu", (event) => event.preventDefault());
      orderGrid.addEventListener("dragstart", (event) => event.preventDefault());
      orderGrid.addEventListener("click", (event) => {
        if (!state.selectMode || dragState.active) {
          return;
        }
        const target = event.target.closest(".order-item");
        if (!target) {
          return;
        }
        toggleSelectedItem(target.dataset.publicId);
      });
      document.addEventListener("touchmove", handleGlobalTouchMove, { passive: false });
      document.addEventListener("gesturestart", (event) => event.preventDefault());
      document.addEventListener("gesturechange", (event) => event.preventDefault());
      document.addEventListener("gestureend", (event) => event.preventDefault());

      fileInput.addEventListener("change", (event) => {
        const files = Array.from(event.target.files || []);
        if (!files.length) {
          return;
        }
        uploadFiles(files);
      });

      state.selectMode = false;
      resetSelection();
      updateSelectionModeUI();
      setLocked(true);
      bootstrapAuth();

      window.addEventListener("pageshow", () => {
        if (!getAuthToken()) {
          isAuthenticated = false;
          setLocked(true);
          showLoginError("");
          return;
        }
        if (!isAuthenticated) {
          bootstrapAuth();
        }
      });

      window.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          try {
            clearDragState();
          } catch (error) {
            // ignore
          }
        }
      });
    </script>
  </body>
